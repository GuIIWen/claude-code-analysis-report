            document.getElementById('page-footer').textContent = pageCopy[lang].footer;
            document.querySelectorAll('[data-switch-lang]').forEach((button) => {
                button.classList.toggle('is-active', button.dataset.switchLang === lang);
                button.setAttribute('aria-pressed', String(button.dataset.switchLang === lang));
            });
        }

        function buildSections(lang) {
            return sections.map((section, index) => {
                const item = section[lang];
                return `
                    <section>
                        <h2>${item.heading}</h2>
                        <div class="section-description">${item.description}</div>
                        <div class="mermaid" data-graph-index="${index}">${item.graph}</div>
                    </section>
                `;
            }).join('');
        }

        async function renderLanguage(lang) {
            currentLang = lang;
            renderToken += 1;
            const token = renderToken;
            updateChrome(lang);

            const content = document.getElementById('content');
            content.innerHTML = buildSections(lang);

            try {
                await mermaid.run({
                    nodes: content.querySelectorAll('.mermaid')
                });
            } catch (error) {
                console.error('Mermaid render failed:', error);
                if (token === renderToken) {
                    content.insertAdjacentHTML(
                        'afterbegin',
                        `<p class="loading-note">${lang === 'zh' ? 'Mermaid 渲染失败，请查看控制台。' : 'Mermaid rendering failed. Check the console.'}</p>`
                    );
                }
            }
        }

        document.querySelectorAll('[data-switch-lang]').forEach((button) => {
            button.addEventListener('click', () => {
                const nextLang = button.dataset.switchLang;
                if (nextLang && nextLang !== currentLang) {
                    renderLanguage(nextLang);
                }
            });
        });

        renderLanguage('zh');
    </script>
</body>
</html>
