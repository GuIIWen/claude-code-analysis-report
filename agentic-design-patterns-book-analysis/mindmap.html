<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agentic Design Patterns</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f3ea;
      --paper: rgba(255, 255, 255, .84);
      --paper-solid: #fffefb;
      --ink: #182033;
      --muted: #667085;
      --line: #d8cfc1;
      --shadow: 0 24px 70px rgba(40, 35, 28, .14);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 18% 12%, rgba(124, 58, 237, .18), transparent 30%),
        radial-gradient(circle at 82% 16%, rgba(14, 165, 233, .15), transparent 28%),
        radial-gradient(circle at 50% 88%, rgba(245, 158, 11, .13), transparent 32%),
        linear-gradient(135deg, #fbf7ed 0%, var(--bg) 54%, #eef6ff 100%);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 5;
      border-bottom: 1px solid rgba(216, 207, 193, .85);
      backdrop-filter: blur(18px);
      background: rgba(247, 243, 234, .84);
    }

    .topbar {
      max-width: 2260px;
      margin: 0 auto;
      padding: 16px 22px;
      display: grid;
      grid-template-columns: minmax(280px, 1fr) minmax(260px, 460px) auto;
      gap: 14px;
      align-items: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 2.8vw, 38px);
      letter-spacing: -.045em;
    }

    .subtitle {
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .search {
      position: relative;
    }

    .search input {
      width: 100%;
      border: 1px solid rgba(216, 207, 193, .95);
      border-radius: 999px;
      outline: 0;
      padding: 13px 44px 13px 17px;
      font-size: 15px;
      background: rgba(255, 255, 255, .92);
      box-shadow: 0 12px 28px rgba(37, 32, 25, .07);
    }

    .search span {
      position: absolute;
      right: 16px;
      top: 11px;
      color: var(--muted);
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      background: #172033;
      color: #fff;
      cursor: pointer;
      font-weight: 800;
      box-shadow: 0 12px 24px rgba(23, 32, 51, .16);
    }

    button.secondary {
      background: #fff;
      color: var(--ink);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    button.is-current {
      background: #172033;
      color: #fff;
      border-color: #172033;
      box-shadow: 0 12px 24px rgba(23, 32, 51, .16);
    }

    main {
      max-width: 2260px;
      margin: 0 auto;
      padding: 22px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
      gap: 18px;
      align-items: start;
    }

    .map-shell,
    .inspector,
    .legend {
      border: 1px solid rgba(216, 207, 193, .82);
      border-radius: var(--radius);
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    .map-shell {
      position: relative;
      overflow: hidden;
      min-height: 780px;
    }

    .map-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(24, 32, 51, .045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(24, 32, 51, .045) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: radial-gradient(circle at 50% 50%, black, transparent 82%);
    }

    .map-meta {
      position: absolute;
      left: 50%;
      top: 18px;
      z-index: 2;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      transform: translateX(-50%);
      max-width: min(1100px, calc(100% - 36px));
      pointer-events: none;
    }

    .map-tools {
      position: absolute;
      top: 18px;
      right: 18px;
      z-index: 3;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid rgba(216, 207, 193, .74);
      border-radius: 999px;
      background: rgba(255, 255, 255, .9);
      box-shadow: 0 10px 24px rgba(37, 32, 25, .08);
    }

    .map-tools button {
      min-width: 40px;
      padding: 8px 12px;
      font-size: 14px;
      line-height: 1;
    }

    .zoom-level {
      min-width: 56px;
      color: #465064;
      font-size: 13px;
      font-weight: 900;
      text-align: center;
    }

    .chip {
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .82);
      border: 1px solid rgba(216, 207, 193, .74);
      color: #3e4658;
      font-size: 12px;
      font-weight: 800;
      box-shadow: 0 8px 18px rgba(37, 32, 25, .06);
    }

    .svg-wrap {
      position: relative;
      width: 100%;
      height: min(80vh, 960px);
      min-height: 760px;
      overflow: auto;
      padding: 54px 22px 26px;
      scroll-behavior: smooth;
    }

    svg {
      display: block;
      width: 3600px;
      height: 1900px;
      min-width: 2500px;
      min-height: 1360px;
      transition: width .16s ease, height .16s ease;
    }

    .zone-panel {
      stroke-width: 1.8;
      opacity: .96;
    }

    .zone-watermark {
      fill: rgba(24, 32, 51, .18);
      font-weight: 900;
      font-size: 28px;
      letter-spacing: .04em;
    }

    .zone-subtitle {
      fill: rgba(24, 32, 51, .42);
      font-size: 14px;
      font-weight: 800;
    }

    .root-halo { fill: url(#rootGlow); opacity: .96; }
    .root-ring { fill: none; stroke: rgba(255, 255, 255, .68); stroke-width: 2.2; }
    .trunk { fill: none; stroke-linecap: round; stroke-width: 13; opacity: .32; transition: opacity .18s ease, stroke-width .18s ease; }
    .branch { fill: none; stroke-linecap: round; stroke-width: 6.2; opacity: .42; transition: opacity .18s ease, stroke-width .18s ease; }
    .twig { fill: none; stroke-linecap: round; stroke-width: 3.2; opacity: .44; transition: opacity .18s ease, stroke-width .18s ease; }
    .twig.tech { stroke-dasharray: 8 8; }
    .twig.risk { stroke-dasharray: 2 7; stroke-width: 2.8; }
    .path-active { opacity: .98; filter: url(#activeShadow); }
    .trunk.path-active { stroke-width: 15px; }
    .branch.path-active { stroke-width: 7.6px; }
    .twig.path-active { stroke-width: 4.4px; }
    .twig.risk.path-active { stroke-width: 3.4px; }
    .path-context { opacity: .54; }
    .path-dim { opacity: .08; }

    .node-text { fill: #182033; font-weight: 820; }
    .node-subtitle { fill: #4d5a70; font-weight: 700; }
    .root-text { fill: #fff; text-anchor: middle; font-weight: 900; letter-spacing: -.035em; }
    .part-node,
    .chapter-node,
    .group-node {
      cursor: pointer;
      transition: opacity .16s ease;
    }

    .node-active { opacity: 1; }
    .node-context { opacity: .58; }
    .node-dim { opacity: .14; }
    .node-hit .hit-frame { stroke: #111827 !important; stroke-width: 3 !important; }

    .part-shell,
    .chapter-shell,
    .group-frame,
    .risk-frame {
      filter: url(#nodeShadow);
      transition: stroke-width .16s ease, filter .16s ease, opacity .16s ease;
    }

    .node-active .part-shell,
    .node-active .chapter-shell,
    .node-active .group-frame,
    .node-active .risk-frame {
      filter: url(#activeShadow);
      stroke-width: 2.8;
    }

    .part-range {
      fill: rgba(255, 255, 255, .88);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .04em;
    }

    .part-mnemonic {
      fill: #304057;
      font-size: 14px;
      font-weight: 760;
    }

    .chapter-head-text {
      fill: #fff;
      font-size: 15px;
      font-weight: 900;
    }

    .chapter-title {
      fill: #182033;
      font-size: 18px;
      font-weight: 900;
    }

    .chapter-definition {
      fill: #425168;
      font-size: 13px;
      font-weight: 720;
    }

    .chapter-anchor-label {
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .04em;
    }

    .chapter-anchor-text {
      fill: #28364a;
      font-size: 12px;
      font-weight: 760;
    }

    .chapter-count {
      font-size: 11px;
      font-weight: 900;
      fill: #233146;
    }

    .chapter-badge-text {
      fill: #fff;
      font-size: 16px;
      font-weight: 900;
      text-anchor: middle;
    }

    .group-title {
      fill: #fff;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .05em;
    }

    .group-line {
      fill: #263247;
      font-size: 12px;
      font-weight: 760;
    }

    .group-frame.tech {
      stroke-dasharray: 9 6;
    }

    .group-tag {
      fill: #5b687d;
      font-size: 11px;
      font-weight: 900;
    }

    .risk-line {
      fill: #562b16;
      font-size: 12px;
      font-weight: 820;
    }

    .legend {
      margin-top: 18px;
      padding: 14px 16px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      box-shadow: 0 14px 38px rgba(37, 32, 25, .08);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      color: #3d4659;
      font-size: 13px;
      font-weight: 820;
    }

    .legend-text {
      display: grid;
      gap: 4px;
    }

    .legend-small {
      color: #6b7280;
      font-size: 12px;
      font-weight: 700;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      flex: 0 0 auto;
    }

    .note {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
    }

    .inspector {
      position: sticky;
      top: 92px;
      padding: 18px;
      max-height: calc(100vh - 112px);
      overflow: auto;
      background: var(--paper-solid);
    }

    .inspector h2 {
      margin: 0 0 6px;
      font-size: 23px;
      letter-spacing: -.03em;
    }

    .inspector .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .inspector p {
      color: #465064;
      line-height: 1.7;
      margin: 8px 0;
      font-size: 14px;
    }

    .section {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid rgba(216, 207, 193, .72);
    }

    .section h3 {
      margin: 0 0 10px;
      font-size: 14px;
      letter-spacing: -.01em;
    }

    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .pill {
      border: 1px solid rgba(124, 58, 237, .17);
      border-radius: 999px;
      padding: 7px 9px;
      background: rgba(124, 58, 237, .08);
      color: #33235f;
      font-size: 12px;
      font-weight: 740;
      line-height: 1.35;
    }

    .pill.tech {
      border-color: rgba(14, 165, 233, .22);
      background: rgba(14, 165, 233, .09);
      color: #075985;
    }

    .pill.risk {
      border-color: rgba(217, 119, 6, .24);
      background: rgba(255, 237, 213, .88);
      color: #9a3412;
    }

    .checklist {
      display: grid;
      gap: 8px;
    }

    .check-item {
      display: grid;
      gap: 5px;
      padding: 11px 12px;
      border-radius: 16px;
      background: rgba(248, 250, 252, .9);
      border: 1px solid rgba(216, 207, 193, .7);
    }

    .check-item strong {
      font-size: 13px;
      color: #182033;
    }

    .check-item span {
      color: #475569;
      font-size: 13px;
      line-height: 1.55;
    }

    .jump-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .jump-grid button,
    .focus-btn {
      padding: 8px 11px;
      font-size: 12px;
    }

    mark {
      background: rgba(250, 204, 21, .55);
      color: inherit;
      border-radius: 4px;
      padding: 0 2px;
    }

    @media (max-width: 1200px) {
      .topbar { grid-template-columns: 1fr; }
      .actions { justify-content: flex-start; }
      .layout { grid-template-columns: 1fr; }
      .inspector { position: static; max-height: none; }
      .legend { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 700px) {
      main, .topbar { padding-left: 14px; padding-right: 14px; }
      .legend { grid-template-columns: 1fr; }
      .map-shell { min-height: 660px; }
      .svg-wrap { min-height: 660px; }
      .map-tools {
        left: 14px;
        right: 14px;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div>
        <h1>Agentic Design Patterns</h1>
        <div class="subtitle">中心主题 → 4 个 Part → 21 章记忆卡 → 组件组 / 技术组 / 风险锚点；默认图上直接承载完整背诵骨架。</div>
      </div>
      <label class="search" aria-label="搜索脑图节点">
        <input id="searchInput" type="search" placeholder="搜索章节、组件或技术节点，例如 MCP / RAG / Guardrails" />
        <span>⌕</span>
      </label>
      <div class="actions">
        <button id="showAll">显示全部</button>
        <button id="focusMemory" class="secondary">总记忆</button>
        <button id="viewOverview" class="secondary is-current" type="button">总览</button>
        <button id="viewMemory" class="secondary" type="button">背诵</button>
        <button id="viewRisk" class="secondary" type="button">风险</button>
        <button id="clearSearch" class="secondary">清空</button>
      </div>
    </div>
  </header>

  <main>
    <section class="layout">
      <div>
        <section class="map-shell" aria-label="SVG 发散式脑图">
          <div class="map-meta" id="mapMeta"></div>
          <div class="map-tools" aria-label="脑图缩放控件">
            <button id="zoomOut" type="button" class="secondary" aria-label="缩小脑图">－</button>
            <span class="zoom-level" id="zoomLevel">86%</span>
            <button id="zoomIn" type="button" class="secondary" aria-label="放大脑图">＋</button>
            <button id="zoomReset" type="button" class="secondary" aria-label="重置脑图缩放">重置</button>
          </div>
          <div class="svg-wrap" id="svgWrap">
            <svg id="mindmapSvg" viewBox="0 0 3600 1900" role="img" aria-labelledby="svgTitle svgDesc">
              <title id="svgTitle">Agentic Design Patterns</title>
              <desc id="svgDesc">一个从中心主题向四个 Part、二十一章、组件组、技术组和风险锚点发散的 SVG 脑图。</desc>
              <defs>
                <radialGradient id="rootGlow" cx="50%" cy="50%" r="64%">
                  <stop offset="0%" stop-color="#7c3aed" />
                  <stop offset="52%" stop-color="#2563eb" />
                  <stop offset="100%" stop-color="#0ea5e9" />
                </radialGradient>
                <filter id="nodeShadow" x="-18%" y="-36%" width="136%" height="190%">
                  <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#1f2937" flood-opacity=".14" />
                </filter>
                <filter id="activeShadow" x="-22%" y="-46%" width="144%" height="210%">
                  <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#111827" flood-opacity=".24" />
                </filter>
                <pattern id="microGrid" width="48" height="48" patternUnits="userSpaceOnUse">
                  <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#182033" stroke-opacity=".045" stroke-width="1" />
                </pattern>
              </defs>
              <rect width="3600" height="1900" fill="url(#microGrid)" opacity=".92"></rect>
              <g id="zonesLayer"></g>
              <g id="linksLayer"></g>
              <g id="nodesLayer"></g>
            </svg>
          </div>
        </section>
        <section class="legend" id="legend"></section>
        <p class="note">保留真正 SVG 脑图：中心主题、4 个 Part、21 章、组件组 / 技术组 / 风险锚点都通过 <code>&lt;path&gt;</code> 曲线连接；支持缩放、横向滚动、搜索与章节聚焦。</p>
      </div>
      <aside class="inspector" id="inspector" aria-live="polite"></aside>
    </section>
  </main>

  <script>
    const mindmapData = {
      center: {
        theme: 'Agentic Design Patterns',
        mainline: '从基础工作流，到状态与学习，再到可靠性与接地，最后进入协议、优化与高级智能。',
        motto: '先把流程跑通，再把状态管住；先把系统做稳，再把智能做深。'
      },
      memory: {
        summary: '工作流组织行动，状态管理连续性，可靠性保证上线，协议与推理拉高上限。',
        parts: ['拆、判、并、审、用、规、协。', '记、学、接、盯。', '稳、审、证。', '连、优、想、守、量、排、探。']
      },
      parts: [
        {
          id: 1,
          title: '基础工作流与协作',
          range: '1-7',
          mnemonic: '拆、判、并、审、用、规、协',
          palette: {
            trunk: '#7c3aed',
            branch: '#8b5cf6',
            soft: '#f3e8ff',
            softer: '#faf5ff',
            border: '#a78bfa',
            text: '#3b0764',
            accent: '#c084fc'
          },
          zone: { x: 48, y: 54, width: 1520, height: 820 },
          x: 1220,
          y: 440,
          direction: -1,
          chapterX: 880,
          groupX: 390,
          chapters: [
            [1, '提示词链', '把复杂任务拆成多个顺序步骤，让上一步输出成为下一步输入。', ['任务拆分器', '提示契约', '中间结果载体', '校验关口'], ['顺序执行', '结构化输出', '中间变量传递', '步骤级日志', '链尾接工具/反思/路由'], '抽取信息 → 转结构化数据 → 生成报告 / 邮件 / 代码说明', '链越长，错误传播越明显；步骤切太碎会让编排复杂度飙升。', '先拆后传，步步验算。'],
            [2, '路由', '根据输入意图、语义或规则，把请求送到最合适的分支、工具或子 Agent。', ['路由器', '标签集合', '分支处理器', '兜底分支'], ['意图分类', '向量语义路由', '规则路由', '低置信度澄清', '路由日志回放'], '客服分流、代码助手分工、研究任务按查询类型派发', '路由错一次，后面整条链都可能建立在错前提上。', '先判路，再出手。'],
            [3, '并行化', '把互不依赖的子任务同时执行，以换取更低总延迟和更高吞吐。', ['子任务切分器', '并行工作单元', '汇聚器', '超时与预算控制器'], ['fan-out / fan-in', 'Map-Reduce 聚合', '分支隔离', '部分失败重试', '限流/超时/速率控制'], '并行搜集新闻 / 财报 / 社媒，再统一综合', '表面独立、实际共享前提的任务，盲目并发会造成冲突答案。', '能并不串，先分后合。'],

    function hexToRgb(hex) {
      const normalized = hex.replace('#', '');
      const size = normalized.length === 3 ? 1 : 2;
      const expand = size === 1 ? normalized.split('').map(item => item + item).join('') : normalized;
      return {
        r: parseInt(expand.slice(0, 2), 16),
        g: parseInt(expand.slice(2, 4), 16),
        b: parseInt(expand.slice(4, 6), 16)
      };

      if (meta.type === 'twig') {
        if (activeChapter && meta.chapter.number === activeChapter) return 'active';
        return state.selected.type === 'part' && meta.part.id === activePartId ? 'context' : 'dim';
      }
      return 'normal';
    }

    function nodeClasses(item, base = '') {
      const relation = nodeRelation(item);
      const hit = state.query && matches(item) ? ' node-hit' : '';
      const relationClass = relation === 'active'
        ? ' node-active'
        : relation === 'context'
          ? ' node-context'
          : relation === 'dim'
            ? ' node-dim'
            : '';
      return `${base}${relationClass}${hit}`.trim();
    }

    function pathClasses(meta, base = '') {
      const relation = pathRelation(meta);
      const relationClass = relation === 'active'
        ? ' path-active'
        : relation === 'context'
          ? ' path-context'
          : relation === 'dim'
            ? ' path-dim'
            : '';
      return `${base}${relationClass}`.trim();
    }

    function pathBetween(from, to, direction) {
      const bend = Math.max(120, Math.abs(to.x - from.x) * 0.48);
      const c1x = from.x + bend * direction;
      const c2x = to.x - bend * direction;
      return `M ${from.x} ${from.y} C ${c1x} ${from.y}, ${c2x} ${to.y}, ${to.x} ${to.y}`;
    }

    function addPath(from, to, baseClass, color, direction, meta) {
      el('path', {
        d: pathBetween(from, to, direction),
        class: pathClasses(meta, baseClass),
        stroke: color
      }, linksLayer);
    }

    function addTextLines(group, lines, x, y, className, size, lineHeight, anchor = 'start') {
      const text = el('text', {
        x,
        y,
        class: className,
        'font-size': size,
        'text-anchor': anchor
      }, group);
      lines.forEach((line, index) => {
        const tspan = el('tspan', {
          x,
          dy: index === 0 ? 0 : lineHeight
        }, text);
        tspan.textContent = line;
      });
      return text;
    }

    function addInteractiveHandlers(group, onClick) {
      group.setAttribute('tabindex', '0');
      group.addEventListener('click', onClick);
      group.addEventListener('keydown', event => {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          onClick();
        }
      });
    }

    function drawZone(part) {
      const zoneGroup = el('g', { class: 'part-zone' }, zonesLayer);
      el('rect', {
        class: 'zone-panel',
        x: part.zone.x,
        y: part.zone.y,
        width: part.zone.width,
        height: part.zone.height,
        rx: 42,
        fill: part.palette.softer,
        stroke: part.palette.border,
        'stroke-opacity': 0.28
      }, zoneGroup);
      addTextLines(zoneGroup, [`PART ${part.id} · ${part.title}`], part.zone.x + 30, part.zone.y + 56, 'zone-watermark', 28, 30);
      addTextLines(zoneGroup, [`第 ${part.range} 章 · ${part.mnemonic}`], part.zone.x + 30, part.zone.y + 84, 'zone-subtitle', 14, 18);
    }

    function drawCenterNode() {
      el('ellipse', { class: 'root-halo', cx: center.x, cy: center.y, rx: center.rx, ry: center.ry }, nodesLayer);
      el('ellipse', { class: 'root-ring', cx: center.x, cy: center.y, rx: center.rx - 14, ry: center.ry - 14 }, nodesLayer);
      const rootGroup = el('g', { class: nodeClasses({ type: 'center' }), tabindex: '0' }, nodesLayer);
      addInteractiveHandlers(rootGroup, () => selectCenter(true));
      addTextLines(rootGroup, ['Agentic Design', 'Patterns'], center.x, center.y - 18, 'root-text', 35, 38, 'middle');
      addTextLines(rootGroup, ['流程 → 状态 → 可靠 → 高级智能'], center.x, center.y + 54, 'root-text', 16, 18, 'middle');
    }

    function drawPartNode(part) {
      const width = 360;
      const height = 116;
      const x = part.x - width / 2;
      const y = part.y - height / 2;
      const group = el('g', { class: nodeClasses({ type: 'part', part }, 'part-node') }, nodesLayer);
      addInteractiveHandlers(group, () => selectPart(part, true));

      el('rect', {
        class: 'part-shell hit-frame',
        x,
        y,
        width,
        height,
        rx: 28,
        fill: '#fffefb',
        stroke: part.palette.border
      }, group);
      el('rect', {
        x,
        y,
        width,
        height: 40,
        rx: 28,
        fill: part.palette.trunk
      }, group);
      el('rect', {
        x,
        y: y + 16,
        width,
        height: 24,
        fill: part.palette.trunk
      }, group);
      addTextLines(group, [`Part ${part.id} · ${part.title}`], x + 22, y + 26, 'chapter-head-text', 15, 18);
      addTextLines(group, [`第 ${part.range} 章 · ${part.chapters.length} 章`], x + 22, y + 58, 'part-range', 12, 14);
      addTextLines(group, [part.mnemonic], x + 22, y + 86, 'part-mnemonic', 14, 17);
      addTextLines(group, [mindmapData.memory.parts[part.id - 1]], x + 22, y + 104, 'part-mnemonic', 13, 16);
    }

    function chapterAnchorLines(chapter) {
      if (state.viewMode === 'risk') {
        return [
          { label: '风险', text: chapter.shortRisk, fill: '#b45309' },
          { label: '口诀', text: shortenText(chapter.motto, 18), fill: chapter.part.palette.text }
        ];
      }
      return [
        { label: '口诀', text: shortenText(chapter.motto, 18), fill: chapter.part.palette.text },
        { label: '风险', text: chapter.shortRisk, fill: '#b45309' }
      ];
    }

    function drawChapterCard(chapter) {
      const width = chapterCard.width;
      const height = chapterCard.height;
      const x = chapter.x - width / 2;
      const y = chapter.y - height / 2;
      const group = el('g', { class: nodeClasses({ type: 'chapter', chapter }, 'chapter-node') }, nodesLayer);
      addInteractiveHandlers(group, () => selectChapter(chapter, true));

      el('rect', {
        class: 'chapter-shell hit-frame',
        x,
        y,
        width,
        height,
        rx: 26,
        fill: chapter.tone.fill,
        stroke: chapter.tone.border
      }, group);
      el('rect', {
        x,
        y,
        width,
        height: 38,
        rx: 26,
        fill: chapter.tone.header
      }, group);
      el('rect', {
        x,
        y: y + 14,
        width,
        height: 24,
        fill: chapter.tone.header
      }, group);

      el('circle', {
        cx: x + 28,
        cy: y + 20,
        r: 18,
        fill: chapter.tone.badge,
        stroke: '#fff',
        'stroke-width': 1.2
      }, group);
      addTextLines(group, [String(chapter.number)], x + 28, y + 25, 'chapter-badge-text', 16, 18, 'middle');
      addTextLines(group, [chapter.title], x + 56, y + 24, 'chapter-head-text', 15, 18);

      const definitionLines = wrapText(chapter.shortDefinition, 23, 2);
      addTextLines(group, definitionLines, x + 20, y + 58, 'chapter-definition', 13, 17);

      const anchors = chapterAnchorLines(chapter);
      addTextLines(group, [`${anchors[0].label}：${anchors[0].text}`], x + 20, y + 102, 'chapter-anchor-text', 12, 15);
      addTextLines(group, [`${anchors[1].label}：${anchors[1].text}`], x + 20, y + 121, 'chapter-anchor-text', 12, 15);
      group.querySelectorAll('.chapter-anchor-text').forEach((node, index) => node.setAttribute('fill', anchors[index].fill));

      el('rect', {
        x: x + width - 82,
        y: y + 94,
        width: 64,
        height: 18,
        rx: 9,
        fill: blend(chapter.part.palette.softer, '#ffffff', 0.2),
        stroke: chapter.part.palette.border,
        'stroke-width': 1
      }, group);
      el('rect', {
        x: x + width - 82,
        y: y + 117,
        width: 64,
        height: 18,
        rx: 9,
        fill: blend(chapter.part.palette.softer, '#ffffff', 0.2),
        stroke: chapter.part.palette.border,
        'stroke-width': 1
      }, group);
      addTextLines(group, [`组件 ${chapter.components.length}`], x + width - 50, y + 107, 'chapter-count', 11, 12, 'middle');
      addTextLines(group, [`技术 ${chapter.techniques.length}`], x + width - 50, y + 130, 'chapter-count', 11, 12, 'middle');
    }

    function leafGroups(chapter) {
      const chapterWave = chapter.index % 2 === 0 ? -8 : 8;
      const visibleComponents = visibleItems(chapter.components);
      const visibleTechniques = visibleItems(chapter.techniques);
      const componentLines = wrapItems(visibleComponents, state.viewMode === 'memory' ? 30 : 24);
      const techniqueLines = wrapItems(visibleTechniques, state.viewMode === 'memory' ? 30 : 24);
      return [
        {
          type: 'group',
          kind: '组件组',
          label: '核心组件',
          items: visibleComponents,
          rawItems: chapter.components,
          x: chapter.groupX,
          y: chapter.y - 42 + chapterWave,
          width: groupCard.width,
          height: groupCard.baseHeight + Math.max(0, componentLines.length - 2) * groupCard.lineHeight,
          lines: componentLines,
          className: 'component',
          stroke: chapter.part.palette.border,
          fill: blend(chapter.tone.fill, '#ffffff', 0.08),
          headFill: chapter.tone.header
        },
        {
          type: 'group',
          kind: '技术组',
          label: '关键技术',
          items: visibleTechniques,
          rawItems: chapter.techniques,
          x: chapter.groupX,
          y: chapter.y + 52 + chapterWave,
          width: groupCard.width,
          height: groupCard.baseHeight + Math.max(0, techniqueLines.length - 2) * groupCard.lineHeight,
          lines: techniqueLines,
          className: 'tech',
          stroke: blend(chapter.part.palette.accent, '#ffffff', 0.12),
          fill: '#ffffff',
          headFill: blend(chapter.part.palette.branch, '#ffffff', 0.12)
        },
        {
          type: 'group',
          kind: '风险锚点',
          label: '风险短锚点',
          items: [chapter.shortRisk],
          rawItems: [chapter.shortRisk],
          x: chapter.riskX,
          y: chapter.y + 98,
          width: 236,
          height: 52,
          lines: wrapText(chapter.shortRisk, 18, 2),
          className: 'risk',
          stroke: '#f59e0b',
          fill: '#ffedd5',
          headFill: '#f59e0b'
        }
      ];
    }

    function drawGroupNode(groupData, chapter) {
      const group = el('g', {
        class: nodeClasses({ type: 'group', chapter, label: groupData.label, kind: groupData.kind, items: groupData.rawItems }, 'group-node')
      }, nodesLayer);
      addInteractiveHandlers(group, () => selectChapter(chapter, true));

      const x = groupData.x - groupData.width / 2;
      const y = groupData.y - groupData.height / 2;
      const isRisk = groupData.className === 'risk';

      el('rect', {
        class: `${isRisk ? 'risk-frame' : `group-frame ${groupData.className}`} hit-frame`,
        x,
        y,
        width: groupData.width,
        height: groupData.height,
        rx: isRisk ? 20 : 24,
        fill: groupData.fill,
        stroke: groupData.stroke
      }, group);
      el('rect', {
        x,
        y,
        width: groupData.width,
        height: 28,
        rx: isRisk ? 20 : 24,
        fill: groupData.headFill
      }, group);
      el('rect', {
        x,
        y: y + 10,
        width: groupData.width,
        height: 18,
        fill: groupData.headFill
      }, group);

      addTextLines(group, [groupData.label], x + 16, y + 18, 'group-title', 12, 14);
      addTextLines(group, [isRisk ? '!' : `${groupData.items.length} 项`], x + groupData.width - 18, y + 18, isRisk ? 'group-title' : 'group-tag', 11, 12, 'end');

      if (isRisk) {
        addTextLines(group, groupData.lines, x + 16, y + 40, 'risk-line', 12, 15);
        return;
      }

      addTextLines(group, groupData.lines, x + 16, y + 46, 'group-line', 12, 17);
    }

    function renderSvg() {
      zonesLayer.innerHTML = '';
      linksLayer.innerHTML = '';
      nodesLayer.innerHTML = '';

      mindmapData.parts.forEach(drawZone);

      mindmapData.parts.forEach(part => {
        addPath(
          { x: center.x + part.direction * center.rx, y: center.y },
          { x: part.x - part.direction * 182, y: part.y },
          'trunk',
          part.palette.trunk,
          part.direction,
          { type: 'trunk', part }
        );

        part.chapters.forEach(chapter => {
          addPath(
            { x: part.x + part.direction * 180, y: part.y },
            { x: chapter.x - part.direction * (chapterCard.width / 2 - 6), y: chapter.y },
            'branch',
            part.palette.branch,
            part.direction,
            { type: 'branch', part, chapter }
          );

          leafGroups(chapter).forEach(groupData => {
            const branchDirection = groupData.x >= chapter.x ? 1 : -1;
            addPath(
              { x: chapter.x + branchDirection * (chapterCard.width / 2 - 10), y: chapter.y + (groupData.className === 'component' ? -18 : groupData.className === 'tech' ? 24 : 60) },
              { x: groupData.x - branchDirection * (groupData.width / 2 - 12), y: groupData.y },
              `twig${groupData.className === 'tech' ? ' tech' : groupData.className === 'risk' ? ' risk' : ''}`,
              groupData.className === 'risk' ? '#f59e0b' : part.palette.branch,
              branchDirection,
              { type: 'twig', part, chapter }
            );
          });
        });
      });

      drawCenterNode();
      mindmapData.parts.forEach(drawPartNode);
      mindmapData.parts.forEach(part => {
        part.chapters.forEach(chapter => {
          drawChapterCard(chapter);
          leafGroups(chapter).forEach(groupData => drawGroupNode(groupData, chapter));
        });
      });
    }

          <div class="section">

          <p>${highlight(chapter.definition)}</p>
          <button class="secondary focus-btn" type="button" id="focusSelection">在图中聚焦本章</button>
          <div class="section">

              <div class="check-item"><strong>图上技术组</strong><span>${chapter.techniques.map(item => highlight(item)).join(' / ')}</span></div>

            </div>
          </div>
          <div class="section"><h3>解释详情：典型落地</h3><p>${highlight(chapter.landing)}</p></div>
          <div class="section"><h3>解释详情：风险边界</h3><p>${highlight(chapter.risk)}</p></div>
        `;
        inspector.querySelector('#focusSelection').addEventListener('click', () => focusChapter(chapter));
        return;
      }

      inspector.innerHTML = `
        <div class="eyebrow">Center Topic</div>
        <h2>${highlight(mindmapData.center.theme)}</h2>
        <p>${highlight(mindmapData.center.mainline)}</p>
        <div class="section">
          <h3>读图方法</h3>
          <div class="checklist">
            <div class="check-item"><strong>第一步</strong><span>先认 4 个 Part 分区色块，建立整本书四段结构。</span></div>
            <div class="check-item"><strong>第二步</strong><span>按章节编号徽章背顺序，再读章卡里的定义、口诀、风险锚点。</span></div>
            <div class="check-item"><strong>第三步</strong><span>直接在图上核对组件组与技术组；右侧只做检查与解释，不是唯一信息入口。</span></div>
          </div>
        </div>
        <div class="section"><h3>总口诀</h3><p><strong>${highlight(mindmapData.center.motto)}</strong></p></div>
        <div class="section"><h3>四段主线</h3><div class="pills">${mindmapData.parts.map(part => `<span class="pill">${highlight(`Part ${part.id}：${part.mnemonic}`)}</span>`).join('')}</div></div>
        <div class="section"><h3>附录工具箱</h3><div class="pills">${mindmapData.appendix.map(item => `<span class="pill tech">${highlight(item)}</span>`).join('')}</div></div>
      `;
    }

    function renderMeta() {
      const chapters = allChapters();
      const componentCount = chapters.reduce((sum, chapter) => sum + chapter.components.length, 0);
      const techniqueCount = chapters.reduce((sum, chapter) => sum + chapter.techniques.length, 0);
      const modeLabel = state.viewMode === 'memory' ? '背诵模式' : state.viewMode === 'risk' ? '风险模式' : '总览模式';
      mapMeta.innerHTML = [
        `${mindmapData.parts.length} 个 Part 色块`,
        `${chapters.length} 个章节记忆卡`,
        `${componentCount} 个完整组件`,
        `${techniqueCount} 个完整技术`,
        modeLabel
      ].map(item => `<span class="chip">${item}</span>`).join('');
    }

    function renderLegend() {
      legend.innerHTML = mindmapData.parts.map(part => `
        <div class="legend-item">
          <span class="dot" style="background:${part.palette.trunk}"></span>
          <span class="legend-text">
            <span>Part ${part.id}：${part.title}</span>
            <span class="legend-small">${part.mnemonic}</span>
          </span>
        </div>
      `).join('');
    }

    function renderViewButtons() {
      const mapping = {
        overview: document.getElementById('viewOverview'),
        memory: document.getElementById('viewMemory'),
        risk: document.getElementById('viewRisk')
      };
      Object.entries(mapping).forEach(([mode, button]) => {
        button.classList.toggle('is-current', state.viewMode === mode);
      });
    }

    function applyZoom(keepScrollPosition = false) {
      const horizontalRatio = svgWrap.scrollWidth > svgWrap.clientWidth
        ? svgWrap.scrollLeft / (svgWrap.scrollWidth - svgWrap.clientWidth)
        : 0;
      const verticalRatio = svgWrap.scrollHeight > svgWrap.clientHeight
        ? svgWrap.scrollTop / (svgWrap.scrollHeight - svgWrap.clientHeight)
        : 0;
      svg.style.width = `${Math.round(canvas.width * state.zoom)}px`;
      svg.style.height = `${Math.round(canvas.height * state.zoom)}px`;
      zoomLevel.textContent = `${Math.round(state.zoom * 100)}%`;
      if (!keepScrollPosition) return;
      requestAnimationFrame(() => {
        svgWrap.scrollLeft = horizontalRatio * Math.max(svgWrap.scrollWidth - svgWrap.clientWidth, 0);
        svgWrap.scrollTop = verticalRatio * Math.max(svgWrap.scrollHeight - svgWrap.clientHeight, 0);
      });
    }

    function adjustZoom(delta) {
      const nextZoom = Math.min(1.34, Math.max(0.7, Number((state.zoom + delta).toFixed(2))));
      if (nextZoom === state.zoom) return;
      state.zoom = nextZoom;
      applyZoom(true);
    }

    function resetZoom() {
      state.zoom = 0.86;
      applyZoom(true);
    }

    function focusPoint(x, y) {
      requestAnimationFrame(() => {
        const scale = svg.clientWidth / canvas.width;
        svgWrap.scrollTo({
          left: Math.max(x * scale - svgWrap.clientWidth / 2, 0),
          top: Math.max(y * scale - svgWrap.clientHeight / 2, 0),
          behavior: 'smooth'
        });
      });
    }

    function focusChapter(chapter) {
      focusPoint(chapter.x + chapter.part.direction * 40, chapter.y);
    }

    function focusPart(part) {
      focusPoint(part.x, part.y);
    }

    function centerViewport() {
      focusPoint(center.x, center.y);
    }

    function rerender() {
      renderMeta();
      renderLegend();
      renderViewButtons();
      renderSvg();
      renderInspector();
    }

    function selectCenter(shouldFocus = false) {
      state.selected = { type: 'center' };
      rerender();
      if (shouldFocus) centerViewport();
    }

    function selectPart(part, shouldFocus = false) {
      state.selected = { type: 'part', part };
      rerender();
      if (shouldFocus) focusPart(part);
    }

    function selectChapter(chapter, shouldFocus = false) {
      state.selected = { type: 'chapter', chapter };
      rerender();
      if (shouldFocus) focusChapter(chapter);
    }

    function firstSearchHit() {
      if (matches({ type: 'center' })) return { type: 'center' };
      for (const part of mindmapData.parts) {
        if (matches({ type: 'part', part })) return { type: 'part', part };
        for (const chapter of part.chapters) {
          if (matches({ type: 'chapter', chapter })) return { type: 'chapter', chapter };
        }
      }
      return null;
    }

    function applySearch() {
      state.query = searchInput.value.trim().toLowerCase();
      if (!state.query) {
        state.selected = { type: 'center' };
        rerender();
        return;
      }
      const hit = firstSearchHit();
      if (!hit) {
        rerender();
        return;
      }
      if (hit.type === 'part') state.selected = hit;
      if (hit.type === 'chapter') state.selected = hit;
      if (hit.type === 'center') state.selected = hit;
      rerender();
    }

    function setViewMode(mode) {
      state.viewMode = mode;
      rerender();
    }

    function init() {
      normalizeParts();
      rerender();
      applyZoom();
      centerViewport();

      searchInput.addEventListener('input', applySearch);
      document.getElementById('clearSearch').addEventListener('click', () => {
        searchInput.value = '';
        applySearch();
      });
      document.getElementById('showAll').addEventListener('click', () => {
        state.query = '';
        searchInput.value = '';
        state.viewMode = 'overview';
        selectCenter(true);
      });
      document.getElementById('focusMemory').addEventListener('click', () => selectCenter(true));
      document.getElementById('viewOverview').addEventListener('click', () => setViewMode('overview'));
      document.getElementById('viewMemory').addEventListener('click', () => setViewMode('memory'));
      document.getElementById('viewRisk').addEventListener('click', () => setViewMode('risk'));
      document.getElementById('zoomOut').addEventListener('click', () => adjustZoom(-0.1));
      document.getElementById('zoomIn').addEventListener('click', () => adjustZoom(0.1));
      document.getElementById('zoomReset').addEventListener('click', resetZoom);
      svgWrap.addEventListener('wheel', event => {
        if (!event.ctrlKey && !event.metaKey) return;
        event.preventDefault();
        adjustZoom(event.deltaY > 0 ? -0.08 : 0.08);
      }, { passive: false });
    }

    init();
  </script>
</body>
</html>
