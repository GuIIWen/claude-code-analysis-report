<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agentic Design Patterns SVG 真脑图</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f3ea;
      --paper: rgba(255, 255, 255, .82);
      --paper-solid: #fffefb;
      --ink: #182033;
      --muted: #667085;
      --line: #d8cfc1;
      --shadow: 0 24px 70px rgba(40, 35, 28, .14);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 18% 12%, rgba(124, 58, 237, .18), transparent 30%),
        radial-gradient(circle at 82% 16%, rgba(14, 165, 233, .16), transparent 28%),
        radial-gradient(circle at 50% 88%, rgba(245, 158, 11, .14), transparent 32%),
        linear-gradient(135deg, #fbf7ed 0%, var(--bg) 54%, #eef6ff 100%);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 5;
      border-bottom: 1px solid rgba(216, 207, 193, .85);
      backdrop-filter: blur(18px);
      background: rgba(247, 243, 234, .84);
    }

    .topbar {
      max-width: 1680px;
      margin: 0 auto;
      padding: 16px 22px;
      display: grid;
      grid-template-columns: minmax(280px, 1fr) minmax(260px, 460px) auto;
      gap: 14px;
      align-items: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 2.8vw, 38px);
      letter-spacing: -.045em;
    }

    .subtitle {
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .search {
      position: relative;
    }

    .search input {
      width: 100%;
      border: 1px solid rgba(216, 207, 193, .95);
      border-radius: 999px;
      outline: 0;
      padding: 13px 44px 13px 17px;
      font-size: 15px;
      background: rgba(255, 255, 255, .92);
      box-shadow: 0 12px 28px rgba(37, 32, 25, .07);
    }

    .search span {
      position: absolute;
      right: 16px;
      top: 11px;
      color: var(--muted);
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      background: #172033;
      color: #fff;
      cursor: pointer;
      font-weight: 800;
      box-shadow: 0 12px 24px rgba(23, 32, 51, .16);
    }

    button.secondary {
      background: #fff;
      color: var(--ink);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    main {
      max-width: 1680px;
      margin: 0 auto;
      padding: 22px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 18px;
      align-items: start;
    }

    .map-shell,
    .inspector,
    .legend {
      border: 1px solid rgba(216, 207, 193, .82);
      border-radius: var(--radius);
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    .map-shell {
      position: relative;
      overflow: hidden;
      min-height: 720px;
    }

    .map-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(24, 32, 51, .045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(24, 32, 51, .045) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: radial-gradient(circle at 50% 50%, black, transparent 78%);
    }

    .map-meta {
      position: absolute;
      left: 50%;
      top: 18px;
      z-index: 2;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      transform: translateX(-50%);
      max-width: min(880px, calc(100% - 36px));
      pointer-events: none;
    }

    .chip {
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .82);
      border: 1px solid rgba(216, 207, 193, .74);
      color: #3e4658;
      font-size: 12px;
      font-weight: 800;
      box-shadow: 0 8px 18px rgba(37, 32, 25, .06);
    }

    .svg-wrap {
      position: relative;
      width: 100%;
      height: min(78vh, 880px);
      min-height: 720px;
      overflow: auto;
    }

    svg {
      display: block;
      width: 100%;
      height: 100%;
      min-width: 1180px;
      min-height: 760px;
    }

    .root-halo { fill: url(#rootGlow); opacity: .95; }
    .root-ring { fill: none; stroke: rgba(255, 255, 255, .65); stroke-width: 2; }
    .trunk { fill: none; stroke-linecap: round; stroke-width: 13; opacity: .42; }
    .branch { fill: none; stroke-linecap: round; stroke-width: 5.2; opacity: .58; }
    .twig { fill: none; stroke-linecap: round; stroke-width: 2.3; opacity: .54; }
    .twig.tech { stroke-dasharray: 5 7; }
    .node-rect { stroke-width: 1.4; filter: url(#nodeShadow); }
    .root-text { fill: #fff; text-anchor: middle; font-weight: 900; letter-spacing: -.035em; }
    .node-title { fill: #182033; font-weight: 900; }
    .node-subtitle { fill: #606a7b; font-weight: 700; }
    .leaf-text { fill: #263247; font-weight: 760; }
    .leaf-kind { fill: #667085; font-weight: 900; }
    .chapter-node, .part-node, .leaf-node { cursor: pointer; transition: opacity .16s ease; }
    .part-node:hover .node-rect,
    .chapter-node:hover .node-rect,
    .leaf-node:hover .node-rect { stroke-width: 2.5; }
    .is-active .node-rect { stroke-width: 3; filter: url(#activeShadow); }
    .is-dim { opacity: .12; }
    .is-hit .node-rect { stroke: #111827; stroke-width: 3; }

    .inspector {
      position: sticky;
      top: 92px;
      padding: 18px;
      max-height: calc(100vh - 112px);
      overflow: auto;
      background: var(--paper-solid);
    }

    .inspector h2 {
      margin: 0 0 6px;
      font-size: 23px;
      letter-spacing: -.03em;
    }

    .inspector .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .inspector p {
      color: #465064;
      line-height: 1.7;
      margin: 8px 0;
      font-size: 14px;
    }

    .section {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid rgba(216, 207, 193, .72);
    }

    .section h3 {
      margin: 0 0 10px;
      font-size: 14px;
      letter-spacing: -.01em;
    }

    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .pill {
      border: 1px solid rgba(124, 58, 237, .17);
      border-radius: 999px;
      padding: 7px 9px;
      background: rgba(124, 58, 237, .08);
      color: #33235f;
      font-size: 12px;
      font-weight: 740;
      line-height: 1.35;
    }

    .pill.tech {
      border-color: rgba(14, 165, 233, .22);
      background: rgba(14, 165, 233, .09);
      color: #075985;
    }

    .legend {
      margin-top: 18px;
      padding: 14px 16px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      box-shadow: 0 14px 38px rgba(37, 32, 25, .08);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      color: #3d4659;
      font-size: 13px;
      font-weight: 820;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      flex: 0 0 auto;
    }

    .note {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
    }

    mark {
      background: rgba(250, 204, 21, .55);
      color: inherit;
      border-radius: 4px;
      padding: 0 2px;
    }

    @media (max-width: 1120px) {
      .topbar { grid-template-columns: 1fr; }
      .actions { justify-content: flex-start; }
      .layout { grid-template-columns: 1fr; }
      .inspector { position: static; max-height: none; }
      .legend { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 620px) {
      main, .topbar { padding-left: 14px; padding-right: 14px; }
      .legend { grid-template-columns: 1fr; }
      .map-shell { min-height: 620px; }
      .svg-wrap { min-height: 620px; }
      svg { min-width: 1080px; min-height: 680px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div>
        <h1>Agentic Design Patterns · SVG 真脑图</h1>
        <div class="subtitle">中心主题 → 4 个 Part 主干 → 21 章分支 → 组件 / 技术叶节点；内容源来自 <code>analyze.md</code>。</div>
      </div>
      <label class="search" aria-label="搜索脑图节点">
        <input id="searchInput" type="search" placeholder="搜索章节、组件或技术节点，例如 MCP / RAG / Guardrails" />
        <span>⌕</span>
      </label>
      <div class="actions">
        <button id="showAll">显示全部</button>
        <button id="focusMemory" class="secondary">总记忆</button>
        <button id="clearSearch" class="secondary">清空</button>
      </div>
    </div>
  </header>

  <main>
    <section class="layout">
      <div>
        <section class="map-shell" aria-label="SVG 发散式脑图">
          <div class="map-meta" id="mapMeta"></div>
          <div class="svg-wrap" id="svgWrap">
            <svg id="mindmapSvg" viewBox="0 0 1800 1260" role="img" aria-labelledby="svgTitle svgDesc">
              <title id="svgTitle">Agentic Design Patterns SVG mind map</title>
              <desc id="svgDesc">一个从中心主题向四个 Part、章节、组件和技术节点发散的 SVG 脑图。</desc>
              <defs>
                <radialGradient id="rootGlow" cx="50%" cy="50%" r="64%">
                  <stop offset="0%" stop-color="#7c3aed" />
                  <stop offset="52%" stop-color="#2563eb" />
                  <stop offset="100%" stop-color="#0ea5e9" />
                </radialGradient>
                <filter id="nodeShadow" x="-18%" y="-36%" width="136%" height="190%">
                  <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#1f2937" flood-opacity=".14" />
                </filter>
                <filter id="activeShadow" x="-22%" y="-46%" width="144%" height="210%">
                  <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#111827" flood-opacity=".24" />
                </filter>
                <pattern id="microGrid" width="48" height="48" patternUnits="userSpaceOnUse">
                  <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#182033" stroke-opacity=".045" stroke-width="1" />
                </pattern>
              </defs>
              <rect width="1800" height="1260" fill="url(#microGrid)" opacity=".9"></rect>
              <g id="linksLayer"></g>
              <g id="nodesLayer"></g>
            </svg>
          </div>
        </section>
        <section class="legend" id="legend"></section>
        <p class="note">这不是章节卡片墙：所有内容都通过 SVG 曲线路径挂接到中心节点，主干、章节枝干、组件/技术细枝按层级发散。画布上的叶节点用于记忆速览；点击任一章节后，右侧面板展示该章完整组件、技术节点、落地与风险。</p>
      </div>
      <aside class="inspector" id="inspector" aria-live="polite"></aside>
    </section>
  </main>

            [2, '路由', '根据输入意图、语义或规则，把请求送到最合适的分支、工具或子 Agent。', ['路由器', '标签集合', '分支处理器', '兜底分支'], ['意图分类', '向量语义路由', '规则路由', '低置信度澄清', '路由日志回放'], '客服分流、代码助手分工、研究任务按查询类型派发', '路由错一次，后面整条链都可能建立在错前提上。', '先判路，再出手。'],

      ],
      appendix: [
        '附录 A：高级提示技术 / few-shot / 结构化输出 / 上下文工程',
        '附录 B：Agentic 交互 / GUI / 视觉接地 / 动作回路',
        '附录 C：框架概览 / LangChain / LangGraph / ADK / CrewAI',
        '附录 D：AgentSpace / 托管式 Agent 平台',
        '附录 E：CLI Agent / 终端高权限执行面',
        '附录 F：推理引擎内部 / 思考预算与控制流',
        '附录 G：编码 Agent / 编辑 / 运行 / 验证 / 修复'

    const SVG_NS = 'http://www.w3.org/2000/svg';
    const center = { x: 900, y: 630, rx: 178, ry: 76 };
    const state = { query: '', selected: { type: 'center' } };
    const svg = document.getElementById('mindmapSvg');
    const linksLayer = document.getElementById('linksLayer');
    const nodesLayer = document.getElementById('nodesLayer');
    const inspector = document.getElementById('inspector');
    const searchInput = document.getElementById('searchInput');
    const mapMeta = document.getElementById('mapMeta');
    const legend = document.getElementById('legend');

    const chapterYRanges = {
      1: [150, 620],
      2: [800, 1050],
      3: [220, 510],
      4: [700, 1160]
    };

    function normalizeParts() {
      mindmapData.parts.forEach(part => {
        const [startY, endY] = chapterYRanges[part.id];
        const gap = part.chapters.length === 1 ? 0 : (endY - startY) / (part.chapters.length - 1);
        part.chapters = part.chapters.map((chapter, index) => ({
          number: chapter[0],
          title: chapter[1],
          definition: chapter[2],
          components: chapter[3],
          techniques: chapter[4],
          landing: chapter[5],
          risk: chapter[6],
          motto: chapter[7],
          part,
          x: part.chapterX,
          y: startY + gap * index
        }));
      });
    }

    function nodeText(item) {
      if (item.type === 'center') return [mindmapData.center.theme, mindmapData.center.mainline, mindmapData.center.motto, mindmapData.memory.summary].join(' ');
      if (item.type === 'part') return [`Part ${item.part.id}`, item.part.title, item.part.range, ...item.part.chapters.map(ch => ch.title)].join(' ');
      if (item.type === 'chapter') return [item.chapter.number, item.chapter.title, item.chapter.definition, item.chapter.landing, item.chapter.risk, item.chapter.motto, ...item.chapter.components, ...item.chapter.techniques].join(' ');
      return [item.label, item.kind, item.chapter.title, item.chapter.definition].join(' ');
    }

    function matches(item) {
      return !state.query || nodeText(item).toLowerCase().includes(state.query);
    }

    function el(name, attrs = {}, parent = null) {
      const node = document.createElementNS(SVG_NS, name);
      Object.entries(attrs).forEach(([key, value]) => node.setAttribute(key, value));
      if (parent) parent.appendChild(node);
      return node;
    }

    function htmlEscape(value) {
      return String(value).replace(/[&<>"']/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char]));
    }

    function highlight(value) {
      const safe = htmlEscape(value);
      if (!state.query) return safe;
      const escaped = state.query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return safe.replace(new RegExp(escaped, 'gi'), match => `<mark>${match}</mark>`);
    }

    function textLines(value, maxChars = 12, maxLines = 2) {
      const tokens = String(value).split(/(\s+|\/|→|、|，|：|（|）)/).filter(Boolean);
      const lines = [];
      let current = '';
      tokens.forEach(token => {
        const compact = token.trim();
        if (!compact) return;
        if ((current + compact).length > maxChars && current) {
          lines.push(current);
          current = compact;
        } else {
          current += compact;
        }
      });
      if (current) lines.push(current);
      const clipped = lines.slice(0, maxLines);
      if (lines.length > maxLines) clipped[maxLines - 1] = clipped[maxLines - 1].replace(/[。,.，、]+$/, '') + '…';
      return clipped;
    }

    function pathBetween(from, to, direction) {
      const bend = Math.max(120, Math.abs(to.x - from.x) * .48);
      const c1x = from.x + bend * direction;
      const c2x = to.x - bend * direction;
      return `M ${from.x} ${from.y} C ${c1x} ${from.y}, ${c2x} ${to.y}, ${to.x} ${to.y}`;
    }

    function addPath(from, to, className, color, direction) {
      el('path', {
        d: pathBetween(from, to, direction),
        class: className,
        stroke: color
      }, linksLayer);
    }

    function addLabel(group, lines, x, y, options = {}) {
      const text = el('text', {
        x,
        y,
        class: options.className || 'node-title',
        'font-size': options.size || 18,
        'text-anchor': options.anchor || 'middle'
      }, group);
      const lineHeight = options.lineHeight || 20;
      lines.forEach((line, index) => {
        const tspan = el('tspan', {
          x,
          dy: index === 0 ? 0 : lineHeight
        }, text);
        tspan.textContent = line;
      });
      return text;
    }

    function addRoundedNode({ x, y, width, height, fill, stroke, className, lines, subtitle, onClick }) {
      const group = el('g', { class: className, transform: `translate(${x - width / 2} ${y - height / 2})` }, nodesLayer);
      el('rect', {
        class: 'node-rect',
        x: 0,
        y: 0,
        width,
        height,
        rx: Math.min(22, height / 2),
        fill,
        stroke
      }, group);
      addLabel(group, lines, width / 2, subtitle ? 27 : height / 2 + 6, { size: width > 210 ? 19 : 14, lineHeight: width > 210 ? 21 : 16 });
      if (subtitle) {
        addLabel(group, [subtitle], width / 2, height - 16, { className: 'node-subtitle', size: 12, lineHeight: 14 });
      }
      if (onClick) {
        group.setAttribute('tabindex', '0');
        group.addEventListener('click', onClick);
        group.addEventListener('keydown', event => {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            onClick();
          }
        });
      }
      return group;
    }

    function leafItems(chapter) {
      return [
        ...chapter.components.slice(0, 2).map(label => ({ kind: '组件', label, className: 'component' })),
        ...chapter.techniques.slice(0, 2).map(label => ({ kind: '技术', label, className: 'tech' }))
      ].slice(0, 4);
    }

    function renderSvg() {
      linksLayer.innerHTML = '';
      nodesLayer.innerHTML = '';

      mindmapData.parts.forEach(part => {
        addPath({ x: center.x + part.direction * 178, y: center.y }, { x: part.x - part.direction * 126, y: part.y }, 'trunk', part.color, part.direction);
        part.chapters.forEach(chapter => {
          addPath({ x: part.x + part.direction * 146, y: part.y }, { x: chapter.x - part.direction * 118, y: chapter.y }, 'branch', part.color, part.direction);
          const leaves = leafItems(chapter);
          const leafGap = 26;
          const firstLeafY = chapter.y - ((leaves.length - 1) * leafGap) / 2;
          leaves.forEach((leaf, index) => {
            const leafY = firstLeafY + leafGap * index;
            addPath({ x: chapter.x + part.direction * 120, y: chapter.y }, { x: part.leafX - part.direction * 88, y: leafY }, `twig ${leaf.className === 'tech' ? 'tech' : ''}`, part.color, part.direction);
          });
        });
      });

      el('ellipse', { class: 'root-halo', cx: center.x, cy: center.y, rx: center.rx, ry: center.ry }, nodesLayer);
      el('ellipse', { class: 'root-ring', cx: center.x, cy: center.y, rx: center.rx - 12, ry: center.ry - 12 }, nodesLayer);
      const rootGroup = el('g', { class: nodeClasses({ type: 'center' }), tabindex: '0' }, nodesLayer);
      rootGroup.addEventListener('click', () => selectCenter());
      rootGroup.addEventListener('keydown', event => {
        if (event.key === 'Enter' || event.key === ' ') selectCenter();
      });
      addLabel(rootGroup, ['Agentic Design', 'Patterns'], center.x, center.y - 16, { className: 'root-text', size: 34, lineHeight: 38 });
      addLabel(rootGroup, ['先流程 · 再状态 · 后可靠 · 深智能'], center.x, center.y + 54, { className: 'root-text', size: 16, lineHeight: 18 });

      mindmapData.parts.forEach(part => {
        const partGroup = addRoundedNode({
          x: part.x,
          y: part.y,
          width: 290,
          height: 92,
          fill: part.color,
          stroke: part.color,
          className: nodeClasses({ type: 'part', part }, 'part-node'),
          lines: [`Part ${part.id}`, part.title],
          subtitle: `第 ${part.range} 章 · ${part.chapters.length} 章`,
          onClick: () => selectPart(part)
        });
        partGroup.querySelectorAll('text').forEach(text => text.setAttribute('fill', '#fff'));

        part.chapters.forEach(chapter => {
          addRoundedNode({
            x: chapter.x,
            y: chapter.y,
            width: 235,
            height: 68,
            fill: '#fffefb',
            stroke: part.color,
            className: nodeClasses({ type: 'chapter', chapter }, 'chapter-node'),
            lines: textLines(`第${chapter.number}章 ${chapter.title}`, 12, 2),
            subtitle: chapter.motto.replace(/。$/, ''),
            onClick: () => selectChapter(chapter)
          });
          const leaves = leafItems(chapter);
          const leafGap = 26;
          const firstLeafY = chapter.y - ((leaves.length - 1) * leafGap) / 2;
          leaves.forEach((leaf, index) => {
            const leafY = firstLeafY + leafGap * index;
            addRoundedNode({
              x: part.leafX,
              y: leafY,
              width: 182,
              height: 28,
              fill: leaf.className === 'tech' ? '#ecfeff' : '#f7f0ff',
              stroke: leaf.className === 'tech' ? '#0ea5e9' : part.color,
              className: nodeClasses({ type: 'leaf', chapter, label: leaf.label, kind: leaf.kind }, `leaf-node ${leaf.className}`),
              lines: textLines(`${leaf.kind}：${leaf.label}`, 17, 1),
              onClick: () => selectChapter(chapter)
            });
          });
        });
      });
    }

    function nodeClasses(item, base = '') {
      const active = isActive(item) ? ' is-active' : '';
      const hit = state.query && matches(item) ? ' is-hit' : '';
      const dim = state.query && !matches(item) ? ' is-dim' : '';
      return `${base}${active}${hit}${dim}`.trim();
    }

    function isActive(item) {
      if (state.selected.type === 'center') return item.type === 'center';
      if (state.selected.type === 'part') return item.type === 'part' && item.part.id === state.selected.part.id;
      if (state.selected.type === 'chapter') return item.type === 'chapter' && item.chapter.number === state.selected.chapter.number;
      return false;
    }

    function allChapters() {
      return mindmapData.parts.flatMap(part => part.chapters);
    }

    function selectCenter() {
      state.selected = { type: 'center' };
      renderSvg();
      renderInspector();
    }

    function selectPart(part) {
      state.selected = { type: 'part', part };
      renderSvg();
      renderInspector();
    }

    function selectChapter(chapter) {
      state.selected = { type: 'chapter', chapter };
      renderSvg();
      renderInspector();
    }

    function renderInspector() {
      if (state.selected.type === 'part') {
        const { part } = state.selected;
        inspector.innerHTML = `
          <div class="eyebrow"><span class="dot" style="background:${part.color}"></span>Part ${part.id}</div>
          <h2>${highlight(part.title)}</h2>
          <p>覆盖第 ${part.range} 章，共 ${part.chapters.length} 个章节分支。点击任一章节节点可查看完整组件、技术、落地与风险。</p>
          <div class="section"><h3>章节分支</h3><div class="pills">${part.chapters.map(ch => `<button class="pill" data-chapter="${ch.number}">第 ${ch.number} 章：${highlight(ch.title)}</button>`).join('')}</div></div>
          <div class="section"><h3>Part 速记</h3><p>${highlight(mindmapData.memory.parts[part.id - 1])}</p></div>
        `;
        inspector.querySelectorAll('[data-chapter]').forEach(button => {
          button.addEventListener('click', () => selectChapter(allChapters().find(ch => ch.number === Number(button.dataset.chapter))));
        });
        return;
      }

      if (state.selected.type === 'chapter') {
        const { chapter } = state.selected;
        const part = chapter.part;
        inspector.innerHTML = `
          <div class="eyebrow"><span class="dot" style="background:${part.color}"></span>Part ${part.id} · 第 ${chapter.number} 章</div>
          <h2>${highlight(chapter.title)}</h2>
          <p>${highlight(chapter.definition)}</p>
          <div class="section"><h3>核心组件</h3><div class="pills">${chapter.components.map(item => `<span class="pill">${highlight(item)}</span>`).join('')}</div></div>
          <div class="section"><h3>关键技术节点</h3><div class="pills">${chapter.techniques.map(item => `<span class="pill tech">${highlight(item)}</span>`).join('')}</div></div>
          <div class="section"><h3>典型落地</h3><p>${highlight(chapter.landing)}</p></div>
          <div class="section"><h3>风险边界</h3><p>${highlight(chapter.risk)}</p></div>
          <div class="section"><h3>记忆口诀</h3><p><strong>${highlight(chapter.motto)}</strong></p></div>
        `;
        return;
      }

      inspector.innerHTML = `
        <div class="eyebrow">Center Topic</div>
        <h2>${highlight(mindmapData.center.theme)}</h2>
        <p>${highlight(mindmapData.center.mainline)}</p>
        <div class="section"><h3>总口诀</h3><p><strong>${highlight(mindmapData.center.motto)}</strong></p></div>
        <div class="section"><h3>全书总记忆</h3><p>${highlight(mindmapData.memory.summary)}</p></div>
        <div class="section"><h3>附录工具箱</h3><div class="pills">${mindmapData.appendix.map(item => `<span class="pill tech">${highlight(item)}</span>`).join('')}</div></div>
      `;
    }

    function renderMeta() {
      const chapters = allChapters();
      const componentCount = chapters.reduce((sum, chapter) => sum + chapter.components.length, 0);
      const techniqueCount = chapters.reduce((sum, chapter) => sum + chapter.techniques.length, 0);
      mapMeta.innerHTML = [
        `${mindmapData.parts.length} 个 Part 主干`,
        `${chapters.length} 个章节分支`,
        `${componentCount} 个核心组件`,
        `${techniqueCount} 个技术节点`,
        '100% 内联 SVG / CSS / JS'
      ].map(item => `<span class="chip">${item}</span>`).join('');
    }

    function renderLegend() {
      legend.innerHTML = mindmapData.parts.map(part => `
        <div class="legend-item"><span class="dot" style="background:${part.color}"></span><span>Part ${part.id}：${part.title}</span></div>
      `).join('');
    }

    function applySearch() {
      state.query = searchInput.value.trim().toLowerCase();
      const firstHit = allChapters().find(chapter => matches({ type: 'chapter', chapter }));
      if (state.query && firstHit) state.selected = { type: 'chapter', chapter: firstHit };
      if (!state.query) state.selected = { type: 'center' };
      renderSvg();
      renderInspector();
    }

    function init() {
      normalizeParts();
      renderMeta();
      renderLegend();
      renderSvg();
      renderInspector();
      searchInput.addEventListener('input', applySearch);
      document.getElementById('clearSearch').addEventListener('click', () => {
        searchInput.value = '';
        applySearch();
      });
      document.getElementById('showAll').addEventListener('click', () => {
        state.query = '';
        searchInput.value = '';
        selectCenter();
      });
      document.getElementById('focusMemory').addEventListener('click', selectCenter);
    }

    init();
  </script>
