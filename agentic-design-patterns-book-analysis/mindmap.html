﻿﻿﻿<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agentic Design Patterns</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f3ea;
      --paper: rgba(255, 255, 255, .84);
      --paper-solid: #fffefb;
      --ink: #182033;
      --muted: #667085;
      --line: #d8cfc1;
      --shadow: 0 24px 70px rgba(40, 35, 28, .14);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 18% 12%, rgba(124, 58, 237, .18), transparent 30%),
        radial-gradient(circle at 82% 16%, rgba(14, 165, 233, .15), transparent 28%),
        radial-gradient(circle at 50% 88%, rgba(245, 158, 11, .13), transparent 32%),
        linear-gradient(135deg, #fbf7ed 0%, var(--bg) 54%, #eef6ff 100%);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 5;
      border-bottom: 1px solid rgba(216, 207, 193, .85);
      backdrop-filter: blur(18px);
      background: rgba(247, 243, 234, .84);
    }

    .topbar {
      max-width: 2260px;
      margin: 0 auto;
      padding: 16px 22px;
      display: grid;
      grid-template-columns: minmax(280px, 1fr) minmax(260px, 460px) auto;
      gap: 14px;
      align-items: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 2.8vw, 38px);
      letter-spacing: -.045em;
    }

    .subtitle {
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .search {
      position: relative;
    }

    .search input {
      width: 100%;
      border: 1px solid rgba(216, 207, 193, .95);
      border-radius: 999px;
      outline: 0;
      padding: 13px 44px 13px 17px;
      font-size: 15px;
      background: rgba(255, 255, 255, .92);
      box-shadow: 0 12px 28px rgba(37, 32, 25, .07);
    }

    .search span {
      position: absolute;
      right: 16px;
      top: 11px;
      color: var(--muted);
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      background: #172033;
      color: #fff;
      cursor: pointer;
      font-weight: 800;
      box-shadow: 0 12px 24px rgba(23, 32, 51, .16);
    }

    button.secondary {
      background: #fff;
      color: var(--ink);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    button.is-current {
      background: #172033;
      color: #fff;
      border-color: #172033;
      box-shadow: 0 12px 24px rgba(23, 32, 51, .16);
    }

    main {
      max-width: 2260px;
      margin: 0 auto;
      padding: 22px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
      gap: 18px;
      align-items: start;
    }

    .map-shell,
    .inspector,
    .legend {
      border: 1px solid rgba(216, 207, 193, .82);
      border-radius: var(--radius);
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    .map-shell {
      position: relative;
      overflow: hidden;
      min-height: 780px;
    }

    .map-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(24, 32, 51, .045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(24, 32, 51, .045) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: radial-gradient(circle at 50% 50%, black, transparent 82%);
    }

    .map-meta {
      position: absolute;
      left: 50%;
      top: 18px;
      z-index: 2;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      transform: translateX(-50%);
      max-width: min(1100px, calc(100% - 36px));
      pointer-events: none;
    }

    .map-tools {
      position: absolute;
      top: 18px;
      right: 18px;
      z-index: 3;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid rgba(216, 207, 193, .74);
      border-radius: 999px;
      background: rgba(255, 255, 255, .9);
      box-shadow: 0 10px 24px rgba(37, 32, 25, .08);
    }

    .map-tools button {
      min-width: 40px;
      padding: 8px 12px;
      font-size: 14px;
      line-height: 1;
    }

    .zoom-level {
      min-width: 56px;
      color: #465064;
      font-size: 13px;
      font-weight: 900;
      text-align: center;
    }

    .chip {
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .82);
      border: 1px solid rgba(216, 207, 193, .74);
      color: #3e4658;
      font-size: 12px;
      font-weight: 800;
      box-shadow: 0 8px 18px rgba(37, 32, 25, .06);
    }

    .svg-wrap {
      position: relative;
      width: 100%;
      height: min(80vh, 960px);
      min-height: 760px;
      overflow: auto;
      padding: 54px 22px 26px;
      scroll-behavior: smooth;
    }

    svg {
      display: block;
      width: 3600px;
      height: 1900px;
      min-width: 2500px;
      min-height: 1360px;
      transition: width .16s ease, height .16s ease;
    }

    .zone-panel {
      stroke-width: 1.8;
      opacity: .96;
    }

    .zone-watermark {
      fill: rgba(24, 32, 51, .18);
      font-weight: 900;
      font-size: 28px;
      letter-spacing: .04em;
    }

    .zone-subtitle {
      fill: rgba(24, 32, 51, .42);
      font-size: 14px;
      font-weight: 800;
    }

    .root-halo { fill: url(#rootGlow); opacity: .96; }
    .root-ring { fill: none; stroke: rgba(255, 255, 255, .68); stroke-width: 2.2; }
    .trunk { fill: none; stroke-linecap: round; stroke-width: 13; opacity: .32; transition: opacity .18s ease, stroke-width .18s ease; }
    .branch { fill: none; stroke-linecap: round; stroke-width: 6.2; opacity: .42; transition: opacity .18s ease, stroke-width .18s ease; }
    .twig { fill: none; stroke-linecap: round; stroke-width: 3.2; opacity: .44; transition: opacity .18s ease, stroke-width .18s ease; }
    .twig.tech { stroke-dasharray: 8 8; }
    .twig.risk { stroke-dasharray: 2 7; stroke-width: 2.8; }
    .path-active { opacity: .98; filter: url(#activeShadow); }
    .trunk.path-active { stroke-width: 15px; }
    .branch.path-active { stroke-width: 7.6px; }
    .twig.path-active { stroke-width: 4.4px; }
    .twig.risk.path-active { stroke-width: 3.4px; }
    .path-context { opacity: .54; }
    .path-dim { opacity: .08; }

    .node-text { fill: #182033; font-weight: 820; }
    .node-subtitle { fill: #4d5a70; font-weight: 700; }
    .root-text { fill: #fff; text-anchor: middle; font-weight: 900; letter-spacing: -.035em; }
    .part-node,
    .chapter-node,
    .group-node {
      cursor: pointer;
      transition: opacity .16s ease;
    }

    .node-active { opacity: 1; }
    .node-context { opacity: .58; }
    .node-dim { opacity: .14; }
    .node-hit .hit-frame { stroke: #111827 !important; stroke-width: 3 !important; }

    .part-shell,
    .chapter-shell,
    .group-frame,
    .risk-frame {
      filter: url(#nodeShadow);
      transition: stroke-width .16s ease, filter .16s ease, opacity .16s ease;
    }

    .node-active .part-shell,
    .node-active .chapter-shell,
    .node-active .group-frame,
    .node-active .risk-frame {
      filter: url(#activeShadow);
      stroke-width: 2.8;
    }

    .part-range {
      fill: rgba(255, 255, 255, .88);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .04em;
    }

    .part-mnemonic {
      fill: #304057;
      font-size: 14px;
      font-weight: 760;
    }

    .chapter-head-text {
      fill: #fff;
      font-size: 15px;
      font-weight: 900;
    }

    .chapter-title {
      fill: #182033;
      font-size: 17px;
      font-weight: 900;
    }

    .chapter-definition {
      fill: #425168;
      font-size: 12px;
      font-weight: 720;
    }

    .chapter-anchor-label {
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .04em;
    }

    .chapter-anchor-text {
      fill: #28364a;
      font-size: 12px;
      font-weight: 760;
    }

    .chapter-count {
      font-size: 11px;
      font-weight: 900;
      fill: #233146;
    }

    .chapter-badge-text {
      fill: #fff;
      font-size: 16px;
      font-weight: 900;
      text-anchor: middle;
    }

    .group-title {
      fill: #fff;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .05em;
    }

    .group-line {
      fill: #263247;
      font-size: 12px;
      font-weight: 760;
    }

    .group-frame.tech {
      stroke-dasharray: 9 6;
    }

    .group-tag {
      fill: #5b687d;
      font-size: 11px;
      font-weight: 900;
    }

    .risk-line {
      fill: #562b16;
      font-size: 12px;
      font-weight: 820;
    }

    .legend {
      margin-top: 18px;
      padding: 14px 16px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      box-shadow: 0 14px 38px rgba(37, 32, 25, .08);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      color: #3d4659;
      font-size: 13px;
      font-weight: 820;
    }

    .legend-text {
      display: grid;
      gap: 4px;
    }

    .legend-small {
      color: #6b7280;
      font-size: 12px;
      font-weight: 700;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      flex: 0 0 auto;
    }

    .note {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
    }

    .inspector {
      position: sticky;
      top: 92px;
      padding: 18px;
      max-height: calc(100vh - 112px);
      overflow: auto;
      background: var(--paper-solid);
    }

    .inspector h2 {
      margin: 0 0 6px;
      font-size: 23px;
      letter-spacing: -.03em;
    }

    .inspector .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .inspector p {
      color: #465064;
      line-height: 1.7;
      margin: 8px 0;
      font-size: 14px;
    }

    .section {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid rgba(216, 207, 193, .72);
    }

    .section h3 {
      margin: 0 0 10px;
      font-size: 14px;
      letter-spacing: -.01em;
    }

    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .pill {
      border: 1px solid rgba(124, 58, 237, .17);
      border-radius: 999px;
      padding: 7px 9px;
      background: rgba(124, 58, 237, .08);
      color: #33235f;
      font-size: 12px;
      font-weight: 740;
      line-height: 1.35;
    }

    .pill.tech {
      border-color: rgba(14, 165, 233, .22);
      background: rgba(14, 165, 233, .09);
      color: #075985;
    }

    .pill.risk {
      border-color: rgba(217, 119, 6, .24);
      background: rgba(255, 237, 213, .88);
      color: #9a3412;
    }

    .checklist {
      display: grid;
      gap: 8px;
    }

    .check-item {
      display: grid;
      gap: 5px;
      padding: 11px 12px;
      border-radius: 16px;
      background: rgba(248, 250, 252, .9);
      border: 1px solid rgba(216, 207, 193, .7);
    }

    .check-item strong {
      font-size: 13px;
      color: #182033;
    }

    .check-item span {
      color: #475569;
      font-size: 13px;
      line-height: 1.55;
    }

    .jump-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .jump-grid button,
    .focus-btn {
      padding: 8px 11px;
      font-size: 12px;
    }

    mark {
      background: rgba(250, 204, 21, .55);
      color: inherit;
      border-radius: 4px;
      padding: 0 2px;
    }

    @media (max-width: 1200px) {
      .topbar { grid-template-columns: 1fr; }
      .actions { justify-content: flex-start; }
      .layout { grid-template-columns: 1fr; }
      .inspector { position: static; max-height: none; }
      .legend { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 700px) {
      main, .topbar { padding-left: 14px; padding-right: 14px; }
      .legend { grid-template-columns: 1fr; }
      .map-shell { min-height: 660px; }
      .svg-wrap { min-height: 660px; }
      .map-tools {
        left: 14px;
        right: 14px;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div>
        <h1>Agentic Design Patterns</h1>
        <div class="subtitle">中心主题 → 4 个 Part → 21 章记忆卡 → 组件组 / 技术组 / 风险锚点；默认图上直接承载完整背诵骨架。</div>
      </div>
      <label class="search" aria-label="搜索脑图节点">
        <input id="searchInput" type="search" placeholder="搜索章节、组件或技术节点，例如 MCP / RAG / Guardrails" />
        <span>⌕</span>
      </label>
      <div class="actions">
        <button id="showAll">显示全部</button>
        <button id="focusMemory" class="secondary">总记忆</button>
        <button id="viewOverview" class="secondary is-current" type="button">总览</button>
        <button id="viewMemory" class="secondary" type="button">背诵</button>
        <button id="viewRisk" class="secondary" type="button">风险</button>
        <button id="clearSearch" class="secondary">清空</button>
      </div>
    </div>
  </header>

  <main>
    <section class="layout">
      <div>
        <section class="map-shell" aria-label="SVG 发散式脑图">
          <div class="map-meta" id="mapMeta"></div>
          <div class="map-tools" aria-label="脑图缩放控件">
            <button id="zoomOut" type="button" class="secondary" aria-label="缩小脑图">－</button>
            <span class="zoom-level" id="zoomLevel">86%</span>
            <button id="zoomIn" type="button" class="secondary" aria-label="放大脑图">＋</button>
            <button id="zoomReset" type="button" class="secondary" aria-label="重置脑图缩放">重置</button>
          </div>
          <div class="svg-wrap" id="svgWrap">
            <svg id="mindmapSvg" viewBox="0 0 3600 1900" role="img" aria-labelledby="svgTitle svgDesc">
              <title id="svgTitle">Agentic Design Patterns</title>
              <desc id="svgDesc">一个从中心主题向四个 Part、二十一章、组件组、技术组和风险锚点发散的 SVG 脑图。</desc>
              <defs>
                <radialGradient id="rootGlow" cx="50%" cy="50%" r="64%">
                  <stop offset="0%" stop-color="#7c3aed" />
                  <stop offset="52%" stop-color="#2563eb" />
                  <stop offset="100%" stop-color="#0ea5e9" />
                </radialGradient>
                <filter id="nodeShadow" x="-18%" y="-36%" width="136%" height="190%">
                  <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#1f2937" flood-opacity=".14" />
                </filter>
                <filter id="activeShadow" x="-22%" y="-46%" width="144%" height="210%">
                  <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#111827" flood-opacity=".24" />
                </filter>
                <pattern id="microGrid" width="48" height="48" patternUnits="userSpaceOnUse">
                  <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#182033" stroke-opacity=".045" stroke-width="1" />
                </pattern>
              </defs>
              <rect width="3600" height="1900" fill="url(#microGrid)" opacity=".92"></rect>
              <g id="zonesLayer"></g>
              <g id="linksLayer"></g>
              <g id="nodesLayer"></g>
            </svg>
          </div>
        </section>
        <section class="legend" id="legend"></section>
        <p class="note">保留真正 SVG 脑图：中心主题、4 个 Part、21 章、组件组 / 技术组 / 风险锚点都通过 <code>&lt;path&gt;</code> 曲线连接；支持缩放、横向滚动、搜索与章节聚焦。</p>
      </div>
      <aside class="inspector" id="inspector" aria-live="polite"></aside>
    </section>
  </main>

  <script>
    const mindmapData = {
  "center": {
    "theme": "Agentic Design Patterns",
    "mainline": "从基础工作流，到状态与学习，再到可靠性与接地，最后进入协议、优化与高级智能。",
    "motto": "先把流程跑通，再把状态管住；先把系统做稳，再把智能做深。"
  },
  "memory": {
    "summary": "工作流组织行动，状态管理连续性，可靠性保证上线，协议与推理拉高上限性能。",
    "parts": [
      "第一段：基础执行模式，确立 Agent 行为的基本骨架。",
      "第二段：认知与控制层，通过记忆与学习实现长效智能。",
      "第三段：可靠性保障，确保系统在复杂环境下的稳健运行。",
      "第四段：高级演进，迈向标准互联与自主探索的深水区。"
    ]
  },
  "parts": [
    {
      "id": 1,
      "title": "基础工作流与协作",
      "range": "1-7",
      "mnemonic": "拆、判、并、审、用、规、协",
      "palette": {
        "trunk": "#7c3aed",
        "branch": "#8b5cf6",
        "soft": "#f3e8ff",
        "softer": "#faf5ff",
        "border": "#a78bfa",
        "text": "#3b0764",
        "accent": "#c084fc"
      },
      "zone": {
        "x": 48,
        "y": 54,
        "width": 1620,
        "height": 820
      },
      "x": 950,
      "y": 440,
      "direction": -1,
      "chapterX": 550,
      "groupX": 160,
      "chapters": [
        {
          "number": 1,
          "title": "提示词链",
          "definition": "本章是全书最基础的执行模式之一，核心不是“怎么写一个更长的提示词”，而是把复杂任务拆成一串职责明确、前后依赖清晰的小步骤。它解决的是单次提示面对多目标、多约束、多阶段任务时容易失控的问题，因此是后续规划、反思、工具调用乃至多 Agent 工作流的底座。",
          "components": [
            "任务分解",
            "把大问题切成可控子问题",
            "输出传递",
            "用上一步结果约束下一步输入空间",
            "角色定制"
          ],
          "techniques": [
            "先指出单一提示词在复杂任务下会出现指令忽略",
            "上下文漂移",
            "错误放大和幻觉等问题",
            "再用市场报告总结—趋势抽取—邮件起草的例子说明顺序分解",
            "接着强调结构化输出是链稳定运行的前提"
          ],
          "risk": "链式调用会增加总延迟和调用成本",
          "motto": "复杂任务拆链走，结构输出稳如狗。"
        },
        {
          "number": 2,
          "title": "路由",
          "definition": "如果提示词链解决的是“步骤怎么串”，那么路由解决的就是“当前输入该走哪条路径”。它把 Agent 从固定流水线推进到条件驱动系统，使系统可以根据意图、上下文或语义相似度，将请求分派给最合适的处理流程、工具或子 Agent。",
          "components": [
            "意图分类",
            "把自然语言压缩成可执行分支标签",
            "语义匹配",
            "用嵌入把“说法不同但意思相近”的请求路由到同一能力",
            "默认兜底"
          ],
          "techniques": [
            "先说明线性流程无法处理真实世界输入多样性",
            "再以客户查询为例展示意图识别后转给订单",
            "产品",
            "技术支持或澄清流程",
            "然后归纳四类路由方式——LLM 路由"
          ],
          "risk": "路由错一次，后续整个链可能都建立在错误前提上",
          "motto": "意图识别分叉口，路由精准少绕路。"
        },
        {
          "number": 3,
          "title": "并行化",

    function normalizeParts() {
      const toneSteps = [0.14, 0.26, 0.18, 0.32, 0.22, 0.36, 0.28];
      mindmapData.parts.forEach(part => {
        const [startY, endY] = chapterYRanges[part.id];
        const gap = part.chapters.length === 1 ? 0 : (endY - startY) / (part.chapters.length - 1);
        part.color = part.palette.trunk;
        part.chapters = part.chapters.map((chapter, index) => {
          const y = startY + gap * index + (index % 2 === 0 ? -10 : 10);
          const tone = chapterTone(part.palette, toneSteps[index % toneSteps.length], index);
          
          // 核心：左右交错逻辑已在 normalizeParts 中硬核实现
          let x;
          if (index % 2 === 0) {
            x = part.chapterX; // 外侧
          } else {
            x = part.x + (part.direction * -1 * 380); // 内侧
          }

          return {
            ...chapter,
            landing: chapter.landing || '',
            shortDefinition: shortenText(chapter.definition, 54),
            shortRisk: shortenText(chapter.risk, 26),
            part,
            index,
            x,
            y,
            groupX: x + part.direction * 390,
            riskX: x + part.direction * -220,
            tone
          };
        });
      });
    }

    function hexToRgb(hex) {
      const normalized = hex.replace('#', '');
      const size = normalized.length === 3 ? 1 : 2;
      const expand = size === 1 ? normalized.split('').map(item => item + item).join('') : normalized;
      return {
        r: parseInt(expand.slice(0, 2), 16),
        g: parseInt(expand.slice(2, 4), 16),
        b: parseInt(expand.slice(4, 6), 16)
      };
    }

    function rgbToHex({ r, g, b }) {
      return `#${[r, g, b].map(value => Math.max(0, Math.min(255, Math.round(value))).toString(16).padStart(2, '0')).join('')}`;
    }

    function blend(colorA, colorB, ratio) {
      const left = hexToRgb(colorA);
      const right = hexToRgb(colorB);
      return rgbToHex({
        r: left.r + (right.r - left.r) * ratio,
        g: left.g + (right.g - left.g) * ratio,
        b: left.b + (right.b - left.b) * ratio
      });
    }

    function chapterTone(palette, ratio, index) {
      const alternate = index % 2 === 0 ? 0.06 : 0.14;
      return {
        fill: blend(palette.soft, '#ffffff', 0.25 + ratio / 2),
        header: blend(palette.trunk, '#ffffff', ratio / 2),
        accent: blend(palette.accent, '#ffffff', alternate),
        border: blend(palette.border, '#ffffff', ratio / 3),
        badge: blend(palette.trunk, '#111827', 0.08)
      };
    }

    function shortenText(value, maxChars) {
      const cleaned = String(value).replace(/[。！!]+$/, '').split(/[；;。]/)[0].trim();
      if (cleaned.length <= maxChars) return cleaned;
      return `${cleaned.slice(0, maxChars - 1)}…`;
    }

    function nodeText(item) {
      if (item.type === 'center') return [mindmapData.center.theme, mindmapData.center.mainline, mindmapData.center.motto, mindmapData.memory.summary].join(' ');
      if (item.type === 'part') return [`Part ${item.part.id}`, item.part.title, item.part.range, item.part.mnemonic, ...item.part.chapters.map(ch => ch.title)].join(' ');
      if (item.type === 'chapter') return [item.chapter.number, item.chapter.title, item.chapter.definition, item.chapter.landing, item.chapter.risk, item.chapter.motto, ...item.chapter.components, ...item.chapter.techniques].join(' ');
      return [item.label, item.kind, item.chapter.title, ...item.items].join(' ');
    }

    function matches(item) {
      return !state.query || nodeText(item).toLowerCase().includes(state.query);
    }

    function el(name, attrs = {}, parent = null) {
      const node = document.createElementNS(SVG_NS, name);
      Object.entries(attrs).forEach(([key, value]) => node.setAttribute(key, value));
      if (parent) parent.appendChild(node);
      return node;
    }

    function htmlEscape(value) {
      return String(value).replace(/[&<>"']/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char]));
    }

    function highlight(value) {
      const safe = htmlEscape(value);
      if (!state.query) return safe;
      const escaped = state.query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return safe.replace(new RegExp(escaped, 'gi'), match => `<mark>${match}</mark>`);
    }

    function wrapText(value, maxChars = 20, maxLines = 2) {
      const chars = String(value).replace(/\s+/g, ' ').trim();
      const lines = [];
      let current = '';
      for (const char of chars) {
        current += char;
        if (current.length >= maxChars) {
          lines.push(current);
          current = '';
        }
      }
      if (current) lines.push(current);
      const clipped = lines.slice(0, maxLines);
      if (lines.length > maxLines) clipped[maxLines - 1] = `${clipped[maxLines - 1].slice(0, Math.max(0, maxChars - 1))}…`;
      return clipped.length ? clipped : [''];
    }

    function wrapItems(items, maxChars = 27) {
      const lines = [];
      let current = '';
      items.forEach(item => {
        const segment = current ? ` · ${item}` : item;
        if ((current + segment).length > maxChars && current) {
          lines.push(current);
          current = item;
          return;
        }
        current += segment;
      });
      if (current) lines.push(current);
      return lines;
    }

    function toHint(label) {
      if (/[A-Za-z]/.test(label)) {
        const letters = label.match(/[A-Za-z]+/g) || [];
        const initials = letters.map(word => word[0].toUpperCase()).join('');
        return initials || label.slice(0, 3);
      }
      const compact = label.replace(/[（）()\/\s]/g, '');
      return compact.length <= 2 ? compact : `${compact.slice(0, 2)}·`;
    }

    function visibleItems(items) {
      if (state.viewMode !== 'memory') return items;

    function nodeRelation(item) {
      if (state.selected.type === 'center') {
        return item.type === 'center' ? 'active' : 'normal';
      }

      const activePartId = selectionPartId();
      const activeChapter = selectionChapterNumber();

      if (item.type === 'center') return 'active';
      if (item.type === 'part') return item.part.id === activePartId ? 'active' : 'dim';
      if (item.type === 'chapter') {
        if (activeChapter && item.chapter.number === activeChapter) return 'active';
        return item.chapter.part.id === activePartId ? 'context' : 'dim';
      }
      if (activeChapter) {
        return item.chapter.number === activeChapter ? 'active' : 'dim';
      }
      return item.chapter.part.id === activePartId ? 'context' : 'dim';
    }

    function pathRelation(meta) {
      if (state.selected.type === 'center') return 'normal';

      const activePartId = selectionPartId();
      const activeChapter = selectionChapterNumber();

      if (meta.type === 'trunk') {
        return meta.part.id === activePartId ? 'active' : 'dim';
      }
      if (meta.type === 'branch') {
        if (activeChapter && meta.chapter.number === activeChapter) return 'active';
        return meta.part.id === activePartId ? 'context' : 'dim';
      }
      if (meta.type === 'twig') {
        if (activeChapter && meta.chapter.number === activeChapter) return 'active';
        return state.selected.type === 'part' && meta.part.id === activePartId ? 'context' : 'dim';
      }
      return 'normal';
    }

    function nodeClasses(item, base = '') {
      const relation = nodeRelation(item);
      const hit = state.query && matches(item) ? ' node-hit' : '';
      const relationClass = relation === 'active'

        : relation === 'context'
          ? ' node-context'
          : relation === 'dim'
            ? ' node-dim'
            : '';
      return `${base}${relationClass}${hit}`.trim();
    }

    function pathClasses(meta, base = '') {
      const relation = pathRelation(meta);
      const relationClass = relation === 'active'
        ? ' path-active'
        : relation === 'context'
          ? ' path-context'
          : relation === 'dim'
            ? ' path-dim'
            : '';
      return `${base}${relationClass}`.trim();
    }

    function pathBetween(from, to, direction) {
      const bend = Math.max(120, Math.abs(to.x - from.x) * 0.48);
      const c1x = from.x + bend * direction;
      const c2x = to.x - bend * direction;
      return `M ${from.x} ${from.y} C ${c1x} ${from.y}, ${c2x} ${to.y}, ${to.x} ${to.y}`;
    }

      }, group);

      addTextLines(group, [groupData.label], x + 16, y + 18, 'group-title', 12, 14);
      addTextLines(group, [isRisk ? '!' : `${groupData.items.length} 项`], x + groupData.width - 18, y + 18, isRisk ? 'group-title' : 'group-tag', 11, 12, 'end');

      if (isRisk) {
        addTextLines(group, groupData.lines, x + 16, y + 40, 'risk-line', 12, 15);
        return;
      }

      addTextLines(group, groupData.lines, x + 16, y + 46, 'group-line', 12, 17);
    }

    function renderSvg() {
      zonesLayer.innerHTML = '';
      linksLayer.innerHTML = '';
      nodesLayer.innerHTML = '';

      mindmapData.parts.forEach(drawZone);

      mindmapData.parts.forEach(part => {
        addPath(
          { x: center.x + part.direction * center.rx, y: center.y },
          { x: part.x - part.direction * 182, y: part.y },
          'trunk',
          part.palette.trunk,
          part.direction,
          { type: 'trunk', part }
        );

        part.chapters.forEach(chapter => {
          addPath(
            { x: part.x + part.direction * 180, y: part.y },
            { x: chapter.x - part.direction * (chapterCard.width / 2 - 6), y: chapter.y },
            'branch',
            part.palette.branch,
            part.direction,
            { type: 'branch', part, chapter }
          );

          leafGroups(chapter).forEach(groupData => {
            const branchDirection = groupData.x >= chapter.x ? 1 : -1;
            addPath(
              { x: chapter.x + branchDirection * (chapterCard.width / 2 - 10), y: chapter.y + (groupData.className === 'component' ? -18 : groupData.className === 'tech' ? 24 : 60) },
              { x: groupData.x - branchDirection * (groupData.width / 2 - 12), y: groupData.y },
              `twig${groupData.className === 'tech' ? ' tech' : groupData.className === 'risk' ? ' risk' : ''}`,
              groupData.className === 'risk' ? '#f59e0b' : part.palette.branch,
              branchDirection,
              { type: 'twig', part, chapter }
            );
          });
        });
      });

      drawCenterNode();
      mindmapData.parts.forEach(drawPartNode);
      mindmapData.parts.forEach(part => {
        part.chapters.forEach(chapter => {
          drawChapterCard(chapter);
          leafGroups(chapter).forEach(groupData => drawGroupNode(groupData, chapter));
        });
      });
    }

    function renderInspector() {
      if (state.selected.type === 'part') {
        const { part } = state.selected;
        inspector.innerHTML = `
          <div class="eyebrow"><span class="dot" style="background:${part.palette.trunk}"></span>Part ${part.id}</div>
          <h2>${highlight(part.title)}</h2>
          <p>这一块负责建立稳定分块记忆：先记阶段动词，再按章节顺序回背章卡、组件组、技术组。</p>
          <div class="section">
            <h3>Part 速记</h3>
            <div class="checklist">
              <div class="check-item"><strong>阶段口诀</strong><span>${highlight(part.mnemonic)}</span></div>
              <div class="check-item"><strong>阶段定位</strong><span>${highlight(mindmapData.memory.parts[part.id - 1])}</span></div>
              <div class="check-item"><strong>看图方法</strong><span>先背同色分区，再沿中心 → Part → 章节路径，最后校验组件组与技术组。</span></div>
            </div>
          </div>
          <div class="section">
            <h3>章节背诵顺序</h3>
            <div class="jump-grid">
              ${part.chapters.map(ch => `<button class="secondary" type="button" data-chapter="${ch.number}">第 ${ch.number} 章 · ${highlight(ch.title)}</button>`).join('')}
            </div>
          </div>
        `;
        inspector.querySelectorAll('[data-chapter]').forEach(button => {
          button.addEventListener('click', () => {
            const chapter = allChapters().find(item => item.number === Number(button.dataset.chapter));
            if (chapter) selectChapter(chapter, true);
          });
        });
        return;
      }

      if (state.selected.type === 'chapter') {
        const { chapter } = state.selected;
        const part = chapter.part;
        inspector.innerHTML = `
          <div class="eyebrow"><span class="dot" style="background:${part.palette.trunk}"></span>Part ${part.id} · 第 ${chapter.number} 章</div>
          <h2>${highlight(chapter.title)}</h2>
          <p>${highlight(chapter.definition)}</p>
          <button class="secondary focus-btn" type="button" id="focusSelection">在图中聚焦本章</button>
          <div class="section">
            <h3>背诵检查</h3>
            <div class="checklist">
              <div class="check-item"><strong>P0 编号徽章</strong><span>先认出大号章号 ${chapter.number}，再背章名与所属 Part。</span></div>
              <div class="check-item"><strong>定义短句</strong><span>${highlight(chapter.shortDefinition)}</span></div>
              <div class="check-item"><strong>图上组件组</strong><span>${chapter.components.map(item => highlight(item)).join(' / ')}</span></div>
              <div class="check-item"><strong>图上技术组</strong><span>${chapter.techniques.map(item => highlight(item)).join(' / ')}</span></div>
              <div class="check-item"><strong>口诀与风险</strong><span>${highlight(chapter.motto)} ｜ ${highlight(chapter.shortRisk)}</span></div>
            </div>
          </div>
          <div class="section"><h3>解释详情：典型落地</h3><p>${highlight(chapter.landing)}</p></div>
          <div class="section"><h3>解释详情：风险边界</h3><p>${highlight(chapter.risk)}</p></div>
        `;
        inspector.querySelector('#focusSelection').addEventListener('click', () => focusChapter(chapter));
        return;
      }

      inspector.innerHTML = `
        <div class="eyebrow">Center Topic</div>
        <h2>${highlight(mindmapData.center.theme)}</h2>
        <p>${highlight(mindmapData.center.mainline)}</p>
        <div class="section">
          <h3>读图方法</h3>
          <div class="checklist">
            <div class="check-item"><strong>第一步</strong><span>先认 4 个 Part 分区色块，建立整本书四段结构。</span></div>
            <div class="check-item"><strong>第二步</strong><span>按章节编号徽章背顺序，再读章卡里的定义、口诀、风险锚点。</span></div>
            <div class="check-item"><strong>第三步</strong><span>直接在图上核对组件组与技术组；右侧只做检查与解释，不是唯一信息入口。</span></div>
          </div>
        </div>
        <div class="section"><h3>总口诀</h3><p><strong>${highlight(mindmapData.center.motto)}</strong></p></div>
        <div class="section"><h3>四段主线</h3><div class="pills">${mindmapData.parts.map(part => `<span class="pill">${highlight(`Part ${part.id}：${part.mnemonic}`)}</span>`).join('')}</div></div>
        <div class="section"><h3>附录工具箱</h3><div class="pills">${mindmapData.appendix.map(item => `<span class="pill tech">${highlight(item)}</span>`).join('')}</div></div>
      `;
    }

    function renderMeta() {
      const chapters = allChapters();
      const componentCount = chapters.reduce((sum, chapter) => sum + chapter.components.length, 0);
      const techniqueCount = chapters.reduce((sum, chapter) => sum + chapter.techniques.length, 0);
      const modeLabel = state.viewMode === 'memory' ? '背诵模式' : state.viewMode === 'risk' ? '风险模式' : '总览模式';
      mapMeta.innerHTML = [
        `${mindmapData.parts.length} 个 Part 色块`,
        `${chapters.length} 个章节记忆卡`,
        `${componentCount} 个完整组件`,
        `${techniqueCount} 个完整技术`,
        modeLabel
      ].map(item => `<span class="chip">${item}</span>`).join('');
    }

    function renderLegend() {
      legend.innerHTML = mindmapData.parts.map(part => `
        <div class="legend-item">
          <span class="dot" style="background:${part.palette.trunk}"></span>
          <span class="legend-text">
            <span>Part ${part.id}：${part.title}</span>
            <span class="legend-small">${part.mnemonic}</span>
          </span>
        </div>
      `).join('');
    }

    function renderViewButtons() {
      const mapping = {
        overview: document.getElementById('viewOverview'),
        memory: document.getElementById('viewMemory'),
        risk: document.getElementById('viewRisk')
      };
      Object.entries(mapping).forEach(([mode, button]) => {
        button.classList.toggle('is-current', state.viewMode === mode);
      });
    }

    function applyZoom(keepScrollPosition = false) {
      const horizontalRatio = svgWrap.scrollWidth > svgWrap.clientWidth
        ? svgWrap.scrollLeft / (svgWrap.scrollWidth - svgWrap.clientWidth)
        : 0;
      const verticalRatio = svgWrap.scrollHeight > svgWrap.clientHeight
        ? svgWrap.scrollTop / (svgWrap.scrollHeight - svgWrap.clientHeight)
        : 0;
      svg.style.width = `${Math.round(canvas.width * state.zoom)}px`;
      svg.style.height = `${Math.round(canvas.height * state.zoom)}px`;
      zoomLevel.textContent = `${Math.round(state.zoom * 100)}%`;
      if (!keepScrollPosition) return;
      requestAnimationFrame(() => {
        svgWrap.scrollLeft = horizontalRatio * Math.max(svgWrap.scrollWidth - svgWrap.clientWidth, 0);
        svgWrap.scrollTop = verticalRatio * Math.max(svgWrap.scrollHeight - svgWrap.clientHeight, 0);
      });
    }

    function adjustZoom(delta) {
      const nextZoom = Math.min(1.34, Math.max(0.7, Number((state.zoom + delta).toFixed(2))));
      if (nextZoom === state.zoom) return;
      state.zoom = nextZoom;
      applyZoom(true);
    }

    function resetZoom() {
      state.zoom = 0.86;
      applyZoom(true);
    }

    function focusPoint(x, y) {
      requestAnimationFrame(() => {
        const scale = svg.clientWidth / canvas.width;
        svgWrap.scrollTo({
          left: Math.max(x * scale - svgWrap.clientWidth / 2, 0),
          top: Math.max(y * scale - svgWrap.clientHeight / 2, 0),
          behavior: 'smooth'
        });
      });
    }

    function focusChapter(chapter) {
      focusPoint(chapter.x + chapter.part.direction * 40, chapter.y);
    }

    function focusPart(part) {
      focusPoint(part.x, part.y);
    }

    function centerViewport() {
      focusPoint(center.x, center.y);
    }

    function rerender() {
      renderMeta();
      renderLegend();
      renderViewButtons();
      renderSvg();
      renderInspector();
    }

    function selectCenter(shouldFocus = false) {
      state.selected = { type: 'center' };
      rerender();
      if (shouldFocus) centerViewport();
    }

    function selectPart(part, shouldFocus = false) {
      state.selected = { type: 'part', part };
      rerender();
      if (shouldFocus) focusPart(part);
    }

    function selectChapter(chapter, shouldFocus = false) {
      state.selected = { type: 'chapter', chapter };
      rerender();
      if (shouldFocus) focusChapter(chapter);
    }

    function firstSearchHit() {
      if (matches({ type: 'center' })) return { type: 'center' };
      for (const part of mindmapData.parts) {
        if (matches({ type: 'part', part })) return { type: 'part', part };
        for (const chapter of part.chapters) {
          if (matches({ type: 'chapter', chapter })) return { type: 'chapter', chapter };
        }
      }
      return null;
    }

    function applySearch() {
      state.query = searchInput.value.trim().toLowerCase();
      if (!state.query) {
        state.selected = { type: 'center' };
        rerender();
        return;
      }
      const hit = firstSearchHit();
      if (!hit) {
        rerender();
        return;
      }
      if (hit.type === 'part') state.selected = hit;
      if (hit.type === 'chapter') state.selected = hit;
      if (hit.type === 'center') state.selected = hit;
      rerender();
    }

    function setViewMode(mode) {
      state.viewMode = mode;
      rerender();
    }


    let dragTarget = null;
    let dragStartPos = { x: 0, y: 0 };
    let isDragging = false;

    function getSvgCoords(event) {
      const CTM = svg.getScreenCTM();
      return {
        x: (event.clientX - CTM.e) / CTM.a,
        y: (event.clientY - CTM.f) / CTM.d
      };
    }

    svg.addEventListener('mousedown', e => {
      const node = e.target.closest('.chapter-node, .group-node');
      if (node) {
        dragTarget = node;
        dragStartPos = getSvgCoords(e);
        isDragging = false;
      }
    });

    window.addEventListener('mousemove', e => {
      if (!dragTarget) return;
      const coords = getSvgCoords(e);
      const dx = coords.x - dragStartPos.x;
      const dy = coords.y - dragStartPos.y;

      if (!isDragging && Math.hypot(dx, dy) > 5) {
        isDragging = true;
      }

      if (isDragging) {
        const num = parseInt(dragTarget.getAttribute('data-chapter-num'));
        const chapter = allChapters().find(c => c.number === num);
        if (dragTarget.classList.contains('chapter-node')) {
          chapter.x += dx;
          chapter.y += dy;
        } else {
          const gClass = dragTarget.getAttribute('data-group-class');
          if (gClass === 'risk') {
            chapter.riskX += dx;
          } else {
            chapter.groupX += dx;
          }
          if (!chapter.groupOffsets) chapter.groupOffsets = { component: 0, tech: 0, risk: 0 };
          if (gClass === 'component') chapter.groupOffsets.component += dy;
          else if (gClass === 'tech') chapter.groupOffsets.tech += dy;
          else if (gClass === 'risk') chapter.groupOffsets.risk += dy;
        }
        dragStartPos = coords;
        renderSvg();
      }
    });

    window.addEventListener('mouseup', e => {
      if (isDragging) {
        const captureClick = (ev) => {
          ev.stopPropagation();
          window.removeEventListener('click', captureClick, true);
        };
        window.addEventListener('click', captureClick, true);
      }
      dragTarget = null;
      isDragging = false;
    });

    function init() {
      normalizeParts();
      rerender();
      applyZoom();
      centerViewport();

      searchInput.addEventListener('input', applySearch);
      document.getElementById('clearSearch').addEventListener('click', () => {
        searchInput.value = '';
        applySearch();
      });
      document.getElementById('showAll').addEventListener('click', () => {
        state.query = '';
        searchInput.value = '';
        state.viewMode = 'overview';
        selectCenter(true);
      });
      document.getElementById('focusMemory').addEventListener('click', () => selectCenter(true));
      document.getElementById('viewOverview').addEventListener('click', () => setViewMode('overview'));
      document.getElementById('viewMemory').addEventListener('click', () => setViewMode('memory'));
      document.getElementById('viewRisk').addEventListener('click', () => setViewMode('risk'));
      document.getElementById('zoomOut').addEventListener('click', () => adjustZoom(-0.1));
      document.getElementById('zoomIn').addEventListener('click', () => adjustZoom(0.1));
      document.getElementById('zoomReset').addEventListener('click', resetZoom);
      svgWrap.addEventListener('wheel', event => {
        if (!event.ctrlKey && !event.metaKey) return;
        event.preventDefault();
        adjustZoom(event.deltaY > 0 ? -0.08 : 0.08);
      }, { passive: false });
    }

    init();
  </script>
</body>
</html>
