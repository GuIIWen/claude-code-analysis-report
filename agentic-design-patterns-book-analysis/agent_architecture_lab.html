﻿<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic Design Patterns - 智能体架构实验室</title>
    <style>
        :root {
            --bg: #050a14;
            --panel: rgba(13, 25, 45, 0.75);
            --panel-border: rgba(145, 190, 255, 0.15);
            --accent: #64d2ff;
            --accent-glow: rgba(100, 210, 255, 0.4);
            --text-primary: #eaf2ff;
            --text-muted: #97a8c6;
            --success: #78f0c8;
            --warning: #ffd666;
            --danger: #ff7875;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: var(--font-family);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(100, 210, 255, 0.05), transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(120, 240, 200, 0.05), transparent 40%);
        }

        /* Top Header & Scores */
        header {
            height: 80px;
            border-bottom: 1px solid var(--panel-border);
            display: flex;
            align-items: center;
            padding: 0 30px;
            background: rgba(7, 17, 31, 0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .logo {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(90deg, var(--accent), var(--success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-right: 40px;
        }

        .scores {
            display: flex;
            gap: 20px;
            flex-grow: 1;
        }

        .score-card {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            padding: 8px 16px;
            border-radius: 12px;
            min-width: 120px;
            transition: all 0.3s ease;
        }

        .score-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .score-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .score-value .unit { font-size: 12px; color: var(--text-muted); }

        /* Main Content Layout */
        .container {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
        }

        /* Sidebar */
        aside {
            width: 320px;
            border-right: 1px solid var(--panel-border);
            background: rgba(10, 20, 38, 0.6);
            overflow-y: auto;
            padding: 20px;
            scrollbar-width: thin;
            scrollbar-color: var(--panel-border) transparent;
        }

        .category {
            margin-bottom: 30px;
        }

        .category-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .category-title::after {
            content: "";
            flex-grow: 1;
            height: 1px;
            background: var(--panel-border);
        }

        .agent-item {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .agent-item:hover {
            background: rgba(100, 210, 255, 0.05);
            border-color: rgba(100, 210, 255, 0.1);
        }

        .agent-item.active {
            background: rgba(100, 210, 255, 0.12);
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .agent-name {
            font-size: 14px;
            font-weight: 600;
        }

        .agent-meta {
            font-size: 11px;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
        }

        /* Architecture Lab */
        main {
            flex-grow: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            background-image: 
                linear-gradient(var(--panel-border) 1px, transparent 1px),
                linear-gradient(90deg, var(--panel-border) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        #canvas {
            flex-grow: 1;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #svg-canvas {
            transition: opacity 0.3s ease-in-out;
        }

        /* Info Panel */
        .info-panel {
            position: absolute;
            right: 20px;
            bottom: 20px;
            width: 360px;
            background: var(--panel);
            backdrop-filter: blur(15px);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        .info-panel.visible {
            transform: translateY(0);
            opacity: 1;
            pointer-events: all;
        }

        .info-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .info-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
        }

        .info-chapter {
            font-size: 12px;
            background: rgba(100, 210, 255, 0.1);
            color: var(--accent);
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid rgba(100, 210, 255, 0.2);
        }

        .info-desc {
            font-size: 13px;
            color: var(--text-primary);
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .info-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .detail-item {
            font-size: 12px;
        }

        .detail-label { color: var(--text-muted); margin-bottom: 4px; }
        .detail-value { font-weight: 600; }

        .btn-link {
            display: block;
            width: 100%;
            padding: 10px;
            background: var(--accent);
            color: var(--bg);
            text-align: center;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            transition: opacity 0.2s;
        }

        .btn-link:hover { opacity: 0.9; }

        /* SVG Components */
        .node { cursor: default; }
        .node-rect { fill: var(--panel); stroke: var(--panel-border); stroke-width: 1.5; transition: all 0.3s; }
        .node-diamond { fill: var(--panel); stroke: var(--warning); stroke-width: 1.5; transition: all 0.3s; }
        .node-circle { fill: var(--panel); stroke: var(--success); stroke-width: 1.5; transition: all 0.3s; }
        
        .node:hover .node-rect { stroke: var(--accent); filter: drop-shadow(0 0 8px var(--accent-glow)); }
        .node:hover .node-diamond { stroke: #fff; filter: drop-shadow(0 0 8px var(--warning)); }
        
        .node-text { fill: var(--text-primary); font-size: 11px; font-weight: 600; text-anchor: middle; dominant-baseline: middle; pointer-events: none; }
        .node-subtext { fill: var(--text-muted); font-size: 9px; text-anchor: middle; dominant-baseline: middle; pointer-events: none; }
        
        .arrow { fill: none; stroke: var(--text-muted); stroke-width: 1.2; marker-end: url(#arrowhead); }
        .flow-line { fill: none; stroke: var(--accent); stroke-width: 1.5; stroke-dasharray: 5, 5; animation: dash 20s linear infinite; marker-end: url(#arrowhead-accent); }
        
        @keyframes dash {
            from { stroke-dashoffset: 500; }
            to { stroke-dashoffset: 0; }
        }

        .loop-path { fill: none; stroke: var(--success); stroke-width: 1.5; stroke-dasharray: 4 2; marker-end: url(#arrowhead-success); }
        .label-bg { fill: rgba(5, 10, 20, 0.9); }
        .label-text { fill: var(--accent); font-size: 9px; font-weight: 500; text-anchor: middle; }
        .cond-text { fill: var(--warning); font-size: 9px; font-weight: bold; text-anchor: middle; }

        @keyframes pulse {
            0% { opacity: 0.6; stroke-width: 1.5; }
            50% { opacity: 1; stroke-width: 2.5; }
            100% { opacity: 0.6; stroke-width: 1.5; }
        }
        .active-path { animation: pulse 2s infinite ease-in-out; stroke: var(--accent); }

    </style>
</head>
<body>
    <header>
        <div class="logo">AGENTIC ARCHITECTURE LAB</div>
        <div class="scores">
            <div class="score-card">
                <div class="score-label">系统智能评分</div>
                <div class="score-value" id="score-iq">85<span class="unit">pts</span></div>
            </div>
            <div class="score-card">
                <div class="score-label">预期响应延迟</div>
                <div class="score-value" id="score-latency">1.2<span class="unit">s</span></div>
            </div>
            <div class="score-card">
                <div class="score-label">资源消耗估算</div>
                <div class="score-value" id="score-cost">Mid</div>
            </div>
            <div class="score-card">
                <div class="score-label">架构健壮性</div>
                <div class="score-value" id="score-robustness">High</div>
            </div>
        </div>
    </header>

    <div class="container">
        <aside id="agent-list">
            <!-- Categories and Agents will be injected here -->
        </aside>

        <main>
            <div id="canvas">
                <svg id="svg-canvas" width="800" height="600" viewBox="0 0 800 600">
                    <defs>
                        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                            <polygon points="0 0, 10 3.5, 0 7" fill="#5c6b84" />
                        </marker>
                        <marker id="arrowhead-success" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                            <polygon points="0 0, 10 3.5, 0 7" fill="var(--success)" />
                        </marker>
                        <marker id="arrowhead-accent" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                            <polygon points="0 0, 10 3.5, 0 7" fill="var(--accent)" />
                        </marker>
                        <marker id="arrowhead-warning" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                            <polygon points="0 0, 10 3.5, 0 7" fill="var(--warning)" />
                        </marker>
                        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                            <feGaussianBlur stdDeviation="3" result="blur" />
                            <feComposite in="SourceGraphic" in2="blur" operator="over" />
                        </filter>
                    </defs>
                    <g id="svg-content"></g>
                </svg>
            </div>

            <div class="info-panel" id="info-panel">
                <div class="info-header">
                    <div class="info-title" id="info-title">Agent Name</div>
                    <div class="info-chapter" id="info-chapter">Chapter 1</div>
                </div>
                <div class="info-desc" id="info-desc">
                    Description of the agent's core responsibility and architectural role.
                </div>
                <div class="info-details">
                    <div class="detail-item">
                        <div class="detail-label">预期成本</div>
                        <div class="detail-value" id="info-cost">Mid</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">典型场景</div>
                        <div class="detail-value" id="info-case">Case Study</div>
                    </div>
                </div>
                <a href="#" class="btn-link" id="info-link" target="_blank">查看原著分析报告</a>
            </div>
        </main>
    </div>

    <script>
        const agents = [

            },

            },
            {

                category: "Input",

            },
            {

                name: "人类监督员 (Human Overseer)",
                category: "Perception",
                role: "监控 Agent 行为，在关键环节介入决策",
                case: "医疗/金融 Agent、内容审核",
                chapter: 13,
                cost: "High",
                scores: { iq: 100, latency: "Human", cost: "High", robustness: "Ultra" },
                diagram: "hitl"
            },
            {
                id: "reasoning-tot",
                name: "推理架构 (Reasoning - ToT)",
                category: "Thinking",
                role: "通过 Tree of Thoughts 进行多路径搜索与回溯，解决复杂逻辑问题",
                case: "数学证明、复杂决策规划",
                chapter: 17,
                cost: "High",
                scores: { iq: 96, latency: 8.0, cost: "High", robustness: "High" },
                diagram: "reflection"
            },
            {
                id: "reasoning",
                name: "推理 Agent (Reasoning Agent)",
                category: "Thinking",
                role: "评估检索质量、解决信息冲突并执行逻辑推演",
                case: "Agentic RAG、复杂决策支持",
                chapter: 14,
                cost: "High",
                scores: { iq: 90, latency: 3.5, cost: "High", robustness: "High" },
                diagram: "rag"
            },
            {
                id: "audit",
                name: "防护栏/审计 (Guardrails)",
                category: "Perception",
                role: "在输入与输出阶段强制执行安全策略与合规性检查",
                case: "企业级安全网关、内容合规审计",
                chapter: 18,
                cost: "Low",
                scores: { iq: 82, latency: 0.2, cost: "Low", robustness: "High" },
                diagram: "monitoring"
            },
            {
                id: "hypothesis",
                name: "假设生成器 (Hypothesis Generator)",
                category: "Thinking",
                role: "在未知解空间中生成科学假设或创新思路",
                case: "自主科学研究、新药研发",
                chapter: 21,
                cost: "High",
                scores: { iq: 98, latency: 10.0, cost: "High", robustness: "Low" },
                diagram: "exploration"
            }
        ];

        const categories = {
            FullArch: "🔥 完整工业级架构 (Full Architectures)",
            Perception: "感知与监控 (Perception)",
            Input: "输入与调度 (Input/Scheduling)",
            Thinking: "思考与推理 (Logic/Thinking)",
            Execution: "工具与动作 (Execution)"
        };

        const listContainer = document.getElementById('agent-list');
        const infoPanel = document.getElementById('info-panel');
        const svgContent = document.getElementById('svg-content');

        // Initialize List
        let globalIndex = 1;
        Object.entries(categories).forEach(([key, label]) => {
            const catDiv = document.createElement('div');
            catDiv.className = 'category';
            catDiv.innerHTML = `<div class="category-title">${label}</div>`;
            
            const catAgents = agents.filter(a => a.category === key);
            catAgents.forEach(agent => {
                const item = document.createElement('div');
                item.className = 'agent-item';
                item.innerHTML = `
                    <div class="agent-name">${globalIndex}. ${agent.name}</div>
                    <div class="agent-meta">
                        <span>Cost: ${agent.cost}</span>
                    </div>
                `;
                item.onclick = () => selectAgent(agent, item);
                catDiv.appendChild(item);
                globalIndex++;
            });
            
            listContainer.appendChild(catDiv);
        });

        function selectAgent(agent, element) {
            document.querySelectorAll('.agent-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            // Update Scores
            document.getElementById('score-iq').innerHTML = `${agent.scores.iq}<span class="unit">pts</span>`;
            document.getElementById('score-latency').innerHTML = `${agent.scores.latency}<span class="unit">s</span>`;
            document.getElementById('score-cost').innerText = agent.scores.cost;
            document.getElementById('score-robustness').innerText = agent.scores.robustness;

            // Update Info Panel
            document.getElementById('info-title').innerText = agent.name;
            document.getElementById('info-chapter').innerText = `Chapter ${agent.chapter}`;
            document.getElementById('info-desc').innerText = agent.role;
            document.getElementById('info-cost').innerText = agent.cost;
            document.getElementById('info-case').innerText = agent.case;
            document.getElementById('info-link').href = `chapter_${agent.chapter}_analysis.md`;
            infoPanel.classList.add('visible');

            drawDiagram(agent.diagram);
        }

        function drawNode(x, y, text, shape = "rect", subtext = "") {
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            g.className.baseVal = "node";
            
            let nodeShape;
            if (shape === "diamond") {
                nodeShape = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
                const points = `${x},${y-35} ${x+60},${y} ${x},${y+35} ${x-60},${y}`;
                nodeShape.setAttribute("points", points);
                nodeShape.setAttribute("class", "node-diamond");
            } else if (shape === "circle") {
                nodeShape = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                nodeShape.setAttribute("cx", x);
                nodeShape.setAttribute("cy", y);
                nodeShape.setAttribute("r", 35);
                nodeShape.setAttribute("class", "node-circle");
            } else {
                nodeShape = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                nodeShape.setAttribute("x", x - 60);
                nodeShape.setAttribute("y", y - 25);
                nodeShape.setAttribute("width", 120);
                nodeShape.setAttribute("height", 50);
                nodeShape.setAttribute("rx", 6);
                nodeShape.setAttribute("class", "node-rect");
            }
            
            const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
            txt.setAttribute("x", x);
            txt.setAttribute("y", subtext ? y - 5 : y);
            txt.setAttribute("class", "node-text");
            txt.textContent = text;
            
            g.appendChild(nodeShape);
            g.appendChild(txt);

            if (subtext) {
                const stxt = document.createElementNS("http://www.w3.org/2000/svg", "text");
                stxt.setAttribute("x", x);
                stxt.setAttribute("y", y + 10);
                stxt.setAttribute("class", "node-subtext");
                stxt.textContent = subtext;
                g.appendChild(stxt);
            }
            
            svgContent.appendChild(g);
        }

        function drawFlow(x1, y1, x2, y2, label = "", type = "flow") {
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", x1);
            line.setAttribute("y1", y1);
            line.setAttribute("x2", x2);
            line.setAttribute("y2", y2);
            line.setAttribute("class", type === "flow" ? "flow-line" : "arrow");
            svgContent.appendChild(line);
            
            if (label) {
                drawLabel((x1 + x2) / 2, (y1 + y2) / 2 - 8, label, type === "cond" ? "cond" : "label");
            }
        }

        function drawLabel(x, y, text, type = "label") {
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            
            const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
            txt.setAttribute("x", x);
            txt.setAttribute("y", y);
            txt.setAttribute("class", type === "cond" ? "cond-text" : "label-text");
            txt.textContent = text;
            
            if (type !== "cond") {
                const bgWidth = text.length * 6 + 10;
                const bgHeight = 14;
                const bg = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                bg.setAttribute("x", x - bgWidth / 2);
                bg.setAttribute("y", y - 10);
                bg.setAttribute("width", bgWidth);
                bg.setAttribute("height", bgHeight);
                bg.setAttribute("rx", 3);
                bg.setAttribute("class", "label-bg");
                g.appendChild(bg);
            }
            
            g.appendChild(txt);
            svgContent.appendChild(g);
        }
